<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Nav — Concept Sketch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #403151;
  color: #F1F0DE;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ── Room container ───────────────────────────── */
#room {
  display: flex;
  height: 100vh;
  transition: opacity .3s;
}

/* ── Left: Explainer ──────────────────────────── */
#explainer {
  flex: 1;
  padding: 48px 48px 48px 56px;
  overflow-y: auto;
  min-width: 0;
  transition: all .4s ease-in-out;
  transform: translateX(0);
  opacity: 1;
}
#concept-name {
  font-size: 36px; font-weight: 600; color: #C49428;
  margin-bottom: 6px;
}
#concept-subtitle {
  font-size: 16px; color: #B490CB; margin-bottom: 24px;
  font-style: italic;
}
#concept-text {
  font-size: 18px; color: #F1F0DE; line-height: 1.75;
}
#concept-text a {
  color: #9B6BBA; text-decoration: none;
  border-bottom: 1px dotted #74508B;
  cursor: pointer;
}
#concept-text a:hover { color: #F1F0DE; border-bottom-color: #F1F0DE; }

/* ── Right: Resource bands ────────────────────── */
#bands {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-left: 1px solid #4D355D;
  transition: width .35s ease;
}

.band {
  flex: 1;
  padding: 20px 24px;
  display: flex; flex-direction: column;
  justify-content: center;
  cursor: pointer;
  transition: all .4s ease-in-out;
  position: relative;
  overflow: hidden;
}
.band:hover { filter: brightness(1.12); }

.band-noob   { background: #4D355D; }
.band-mid    { background: #3a2845; }
.band-expert { background: #271B2F; }

/* Band preview (collapsed state) */
.band-icon { font-size: 24px; margin-bottom: 6px; }
.band-label { font-size: 16px; font-weight: 600; color: #F1F0DE; margin-bottom: 3px; }
.band-meta { font-size: 14px; color: #B490CB; }
.band-source { font-size: 13px; color: #74508B; margin-top: 4px; }
.band-preview { font-size: 13px; color: #9B6BBA; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Band content — ALWAYS visible, clipped in collapsed state */
.band-content {
  margin-top: 10px; flex: 1; min-height: 0;
  overflow: hidden; border-radius: 6px;
  position: relative;
}
.band-content iframe {
  width: 100%; border: none; border-radius: 6px;
  pointer-events: none;
}
.band-content .yt-embed { aspect-ratio: 16/9; background: #000; }
.band-content .blog-embed { height: 300px; background: #fff; }
.band-content .pdf-embed { height: 300px; background: #fff; }

/* Play button overlay for video */
.play-overlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; z-index: 2;
  background: rgba(0,0,0,.25); transition: background .15s;
}
.play-overlay:hover { background: rgba(0,0,0,.1); }
.play-btn {
  width: 48px; height: 48px; background: rgba(196,148,40,.9);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.play-btn::after {
  content: ''; width: 0; height: 0;
  border-left: 16px solid #271B2F; border-top: 10px solid transparent; border-bottom: 10px solid transparent;
  margin-left: 3px;
}

/* ── Expanded state (90% takeover) ────────────── */
#room.band-expanded #explainer {
  flex: 0 0 240px;
  padding: 48px 24px 48px 56px; overflow: hidden;
  transition: all .4s ease-in-out;
  border-right: 1px solid #4D355D;
  cursor: pointer;
}
#room.band-expanded #explainer #concept-text { display: none; }
/* Name and subtitle keep their original size — no dancing */
#room.band-expanded #bands {
  width: 100%; border-left: none;
}

/* Collapsed band = thin tab strip */
#room.band-expanded .band {
  flex: 0 0 44px;
  padding: 10px 14px;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  justify-content: flex-start;
}
#room.band-expanded .band .band-preview,
#room.band-expanded .band .band-source,
#room.band-expanded .band .band-meta,
#room.band-expanded .band .band-content { display: none; }
#room.band-expanded .band.active .band-content { display: flex; flex-direction: column; }
#room.band-expanded .band .band-icon { margin-bottom: 0; font-size: 18px; }
#room.band-expanded .band .band-label { margin-bottom: 0; font-size: 13px; }

/* The active expanded band */
#room.band-expanded .band.active {
  flex: 1;
  padding: 24px 32px;
  flex-direction: column;
  align-items: stretch;
  cursor: default;
}
#room.band-expanded .band.active .band-preview { display: none; }
#room.band-expanded .band.active .band-source { display: block; }
#room.band-expanded .band.active .band-meta { display: block; font-size: 14px; }
#room.band-expanded .band.active .band-icon { margin-bottom: 6px; font-size: 24px; }
#room.band-expanded .band.active .band-label { margin-bottom: 3px; font-size: 18px; }
#room.band-expanded .band.active .band-content {
  flex: 1; overflow: visible;
}
#room.band-expanded .band.active .band-content iframe {
  pointer-events: auto; height: 100%;
}
#room.band-expanded .band.active .band-content .yt-embed { height: 100%; }
#room.band-expanded .band.active .play-overlay { display: none; }
#room.band-expanded .band.active .band-preview { display: none; }

/* Back to overview button */
.band-back {
  display: none; font-size: 12px; color: #74508B;
  cursor: pointer; margin-bottom: 12px; transition: color .12s;
}
.band-back:hover { color: #F1F0DE; }
#room.band-expanded .band.active .band-back { display: block; }

/* YouTube embed */
.yt-embed {
  width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px;
  background: #000;
}
/* Blog iframe */
.blog-embed {
  width: 100%; flex: 1; border: none; border-radius: 8px;
  background: #FFF; min-height: 400px;
}
/* Paper abstract */
.paper-abstract {
  font-size: 15px; color: #D7C4E3; line-height: 1.65; margin-bottom: 16px;
}
.paper-link {
  display: inline-block; font-size: 14px; color: #9B6BBA;
  border: 1px solid #4D355D; padding: 6px 14px; border-radius: 6px;
  text-decoration: none; transition: all .12s;
}
.paper-link:hover { color: #F1F0DE; border-color: #9B6BBA; }

/* ── Entry overlay ────────────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(39,27,47,.85);
  backdrop-filter: blur(4px);
}
#overlay.hidden { display: none; }
#search-box {
  width: 640px; padding: 18px 24px;
  font-size: 22px; color: #F1F0DE;
  background: #271B2F; border: 1.5px solid #4D355D;
  border-radius: 12px; outline: none;
  font-family: inherit;
}
#search-box::placeholder { color: #74508B; }
#search-box:focus { border-color: #9B6BBA; }
#sample-prompts { margin-top: 16px; text-align: center; }
.sp-label { font-size: 14px; color: #74508B; margin-bottom: 10px; }
.sp-link {
  display: block; font-size: 18px; color: #B490CB;
  cursor: pointer; padding: 5px 0;
  transition: color .12s;
}
.sp-link:hover { color: #F1F0DE; }
#skip-link {
  margin-top: 24px; font-size: 12px; color: #4D355D;
  cursor: pointer; transition: color .12s;
}
#skip-link:hover { color: #74508B; }

/* ── Zoom out button ──────────────────────────── */
#zoom-out-btn {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  background: #271B2F; border: 1px solid #4D355D;
  color: #74508B; width: 36px; height: 36px;
  border-radius: 8px; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
#zoom-out-btn:hover { border-color: #9B6BBA; color: #F1F0DE; }

/* ── Map view (zoom out) ──────────────────────── */
#map-view {
  display: none;
  position: fixed; inset: 0;
  background: #403151;
  z-index: 50;
  overflow: hidden;
}
#map-svg {
  width: 100%; height: 100%;
}
.map-card {
  cursor: pointer;
}
.map-card rect {
  rx: 8; ry: 8;
  transition: stroke .15s, fill .15s;
}
.map-card:hover rect { stroke: #9B6BBA; fill: #352845; }
.map-card .mc-name { font-size: 15px; fill: #F1F0DE; font-weight: 600; font-family: sans-serif; }
.map-card .mc-sub { font-size: 11px; fill: #74508B; font-family: sans-serif; }
.map-card.current rect { stroke: #C49428; stroke-width: 2; }
.map-card.current .mc-name { fill: #C49428; }
.map-arrow { fill: none; stroke: #74508B; stroke-width: 1.5; marker-end: url(#arrowhead); }
.map-arrow-double { fill: none; stroke: #5899DA; stroke-width: 1.5;
  marker-start: url(#arrowhead-rev); marker-end: url(#arrowhead); }
</style>
</head>
<body>

<div id="overlay">
  <input id="search-box" type="text" placeholder="Ask anything about AI" autocomplete="off">
  <div id="sample-prompts">
    <div class="sp-label">or try:</div>
    <a class="sp-link" data-q="Does RLHF cause sycophancy?">"Does RLHF cause sycophancy?"</a>
    <a class="sp-link" data-q="How does ChatGPT actually work?">"How does ChatGPT actually work?"</a>
    <a class="sp-link" data-q="What even is AI?">"What even is AI?"</a>
  </div>
  <div id="skip-link">or just explore →</div>
</div>

<button id="zoom-out-btn" onclick="zoomOut()" title="See connections">⊞</button>

<div id="map-view">
  <svg id="map-svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#74508B"/>
      </marker>
      <marker id="arrowhead-rev" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
        <polygon points="10 0, 0 3.5, 10 7" fill="#5899DA"/>
      </marker>
    </defs>
  </svg>
</div>

<div id="room">
  <div id="explainer">
    <div id="concept-name"></div>
    <div id="concept-subtitle"></div>
    <div id="concept-text"></div>
  </div>
  <div id="bands"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const ROOMS = {
  transformers: {
    name: 'Transformers',
    subtitle: 'the architecture behind ChatGPT',
    text: `Before Transformers, AI models that processed language had to read words one at a time, like a person scanning a sentence left to right. This made them slow and forgetful — by the time they reached the end of a long paragraph, they'd often lost track of the beginning.<br><br>Transformers changed that completely. Instead of reading sequentially, a Transformer looks at every word in a passage simultaneously and figures out which words are most important to each other. The word "it" in a sentence might strongly connect to "the cat" three sentences earlier — a Transformer can see that connection instantly.<br><br>This ability is called <a onclick="navigateTo('self-attention')">self-attention</a>, and it's the core innovation. It lets Transformers process language in parallel (making them fast) while keeping track of long-range connections (making them smart).<br><br>Transformers are the foundation of every major AI language model: <a onclick="navigateTo('gpt')">GPT</a>, <a onclick="navigateTo('bert')">BERT</a>, Claude, Gemini, Llama. They also power image generation, protein folding prediction, and many other breakthroughs. It's not an exaggeration to say they changed the entire field.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '30 min · video', source: '3Blue1Brown',
        preview: 'Visual walkthrough of how GPT works, starting from zero',
        ytId: 'wjZofJX0v4M',
        url: 'https://www.youtube.com/watch?v=wjZofJX0v4M' },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min · read', source: 'Jay Alammar',
        preview: 'Step-by-step diagrams of every Transformer component',
        embedUrl: 'https://jalammar.github.io/illustrated-transformer/',
        url: 'https://jalammar.github.io/illustrated-transformer/' },
      { level: 'expert', icon: '📄', label: 'Research', meta: '120k citations · paper', source: 'Vaswani et al. 2017',
        preview: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks...',
        abstract: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks that include an encoder and a decoder. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train.',
        url: 'https://arxiv.org/abs/1706.03762' },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'core component' },
      { id: 'gpt', name: 'GPT', rel: 'built on this' },
      { id: 'bert', name: 'BERT', rel: 'built on this' },
      { id: 'attention', name: 'Attention', rel: 'prerequisite' },
    ],
  },
  'self-attention': {
    name: 'Self-Attention',
    subtitle: 'how Transformers decide what matters',
    text: `Self-attention is the mechanism that makes <a onclick="navigateTo('transformers')">Transformers</a> work. It answers a simple question: for each word in a sentence, which other words should it pay attention to?<br><br>Think of it like a group conversation. When someone says "she picked up the ball and threw it," your brain instantly connects "it" to "ball" and "she" to whoever was mentioned earlier. Self-attention does the same thing, but mathematically — it computes a score between every pair of words to figure out which connections matter most.<br><br>The "self" part means it's looking within the same text (as opposed to comparing two different texts). Every word gets to look at every other word and decide how much to care about it. Self-attention evolved from an earlier idea simply called <a onclick="navigateTo('attention')">attention</a>, which was originally designed for translation.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '10 min · video', source: '3Blue1Brown (chapter)',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '8 min · read', source: 'Jay Alammar (section)',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: 'see Transformers paper', source: 'Vaswani et al.',
        extras: [
          { icon: '⚡', label: 'Quadratic memory bottleneck', meta: 'Consensus' },
        ]},
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
      { id: 'attention', name: 'Attention', rel: 'builds on' },
    ],
  },
  gpt: {
    name: 'GPT',
    subtitle: 'Generative Pre-trained Transformer',
    text: `GPT is an AI that predicts the next word. That's it — that's the core idea. You give it some text, and it guesses what comes next. Do that billions of times with internet text, and it learns an enormous amount about language, facts, and reasoning.<br><br>The "Generative" means it creates text. "Pre-trained" means it learns from a huge dataset before being specialized. "<a onclick="navigateTo('transformers')">Transformer</a>" is the architecture it uses.<br><br>GPT is the technology behind ChatGPT. The key insight was that simple next-word prediction, scaled up massively, produces surprisingly capable and general-purpose AI systems.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '25 min · video', source: '3Blue1Brown',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '20 min · read', source: 'OpenAI blog',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '45k citations', source: 'Radford et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'bert', name: 'BERT', rel: 'alternative' },
    ],
  },
  bert: {
    name: 'BERT',
    subtitle: 'Bidirectional Encoder Representations from Transformers',
    text: `While <a onclick="navigateTo('gpt')">GPT</a> reads text left to right (predicting the next word), BERT reads in both directions at once. It masks random words in a sentence and tries to fill in the blanks, learning to understand context from both sides.<br><br>This makes BERT especially good at understanding language — answering questions, classifying text, detecting sentiment — rather than generating it. BERT powered Google Search for years.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '10 min', source: 'Google AI blog',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min', source: 'Jay Alammar',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '95k citations', source: 'Devlin et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'gpt', name: 'GPT', rel: 'alternative' },
    ],
  },
  attention: {
    name: 'Attention',
    subtitle: 'the mechanism that started it all',
    text: `Before <a onclick="navigateTo('self-attention')">self-attention</a>, there was plain attention. The original idea (2014) was simple: when translating a sentence from French to English, the model should be able to "look back" at the French words while generating each English word, focusing on the most relevant ones.<br><br>This solved a huge problem with earlier approaches that tried to compress an entire sentence into a single fixed-size vector. Attention lets the model selectively focus on different parts of the input for each part of the output.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '5 min', source: 'Our explainer',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '10 min', source: 'Distill.pub',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '40k citations', source: 'Bahdanau et al. 2014',
        extras: [] },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'evolved into' },
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
    ],
  },
};

// ─── STATE ───────────────────────────────────────────────────────────────────

let currentRoom = 'transformers';
let history = [];
let expandedBand = null;
const explored = new Set(['transformers']); // fog of war: concepts you've seen
const nodePositions = {}; // persistent positions: once placed, stays put
nodePositions['transformers'] = { x: 0, y: 0 }; // origin

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderRoom(id) {
  const room = ROOMS[id];
  if (!room) return;
  currentRoom = id;
  expandedBand = null;
  document.getElementById('room').classList.remove('band-expanded');

  document.getElementById('concept-name').textContent = room.name;

  // Click the left panel when collapsed → return to overview
  document.getElementById('explainer').onclick = () => {
    if (document.getElementById('room').classList.contains('band-expanded')) {
      collapseAll();
    }
  };
  document.getElementById('concept-subtitle').textContent = room.subtitle;
  document.getElementById('concept-text').innerHTML = room.text;

  // Bands
  const bandsEl = document.getElementById('bands');
  bandsEl.innerHTML = '';
  const roomEl = document.getElementById('room');

  room.bands.forEach((b, i) => {
    const cls = b.level === 'noob' ? 'band-noob' : b.level === 'mid' ? 'band-mid' : 'band-expert';
    const band = document.createElement('div');
    band.className = `band ${cls}`;
    band.dataset.idx = i;

    // Build preloaded content (always visible, clipped)
    let contentHTML = '';
    if (b.ytId) {
      contentHTML = `
        <div class="play-overlay" onclick="event.stopPropagation();playVideo(this)"><div class="play-btn"></div></div>
        <iframe class="yt-embed" data-src="https://www.youtube.com/embed/${b.ytId}?rel=0&autoplay=1" src="https://www.youtube.com/embed/${b.ytId}?rel=0" allowfullscreen></iframe>`;
    } else if (b.embedUrl) {
      contentHTML = `<iframe class="blog-embed" src="${b.embedUrl}"></iframe>`;
    } else if (b.url && b.url.includes('arxiv')) {
      contentHTML = `<iframe class="pdf-embed" src="${b.url.replace('/abs/','/pdf/')}"></iframe>`;
    }

    band.innerHTML = `
      <div class="band-back" onclick="event.stopPropagation();collapseAll()">← Overview</div>
      <div class="band-icon">${b.icon}</div>
      <div class="band-label">${b.label}</div>
      <div class="band-meta">${b.meta}</div>
      ${b.source ? `<div class="band-source">${b.source}</div>` : ''}
      <div class="band-content">${contentHTML}</div>
    `;

    band.addEventListener('click', () => {
      if (band.classList.contains('active')) return;
      // Expand this band to 90%
      expandedBand = i;
      roomEl.classList.add('band-expanded');
      bandsEl.querySelectorAll('.band').forEach(el => el.classList.remove('active'));
      band.classList.add('active');
      // Don't auto-play — let user click play themselves
    });

    bandsEl.appendChild(band);
  });

  // (nav is the left panel itself — no separate breadcrumbs)

  // Scroll explainer to top
  document.getElementById('explainer').scrollTop = 0;
}

function collapseAll() {
  const roomEl = document.getElementById('room');
  roomEl.classList.remove('band-expanded');
  document.querySelectorAll('.band').forEach(el => el.classList.remove('active'));
  expandedBand = null;
}

function playVideo(overlay) {
  const iframe = overlay.parentElement.querySelector('.yt-embed');
  if (iframe && iframe.dataset.src) {
    iframe.src = iframe.dataset.src; // swap to autoplay URL
    iframe.style.pointerEvents = 'auto';
  }
  overlay.style.display = 'none';
}

// ─── ZOOM OUT VIEW ───────────────────────────────────────────────────────────

function zoomOut() {
  document.getElementById('room').style.display = 'none';
  document.getElementById('zoom-out-btn').style.display = 'none';
  document.getElementById('map-view').style.display = 'block';
  renderLocalMap();
}

function zoomIn(id) {
  document.getElementById('map-view').style.display = 'none';
  document.getElementById('zoom-out-btn').style.display = 'flex';
  if (id === currentRoom) {
    // Same room — just restore (state preserved)
    document.getElementById('room').style.display = 'flex';
  } else {
    document.getElementById('room').style.display = 'flex';
    navigateTo(id);
  }
}

function renderLocalMap() {
  const svg = document.getElementById('map-svg');
  const W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Clear previous
  svg.querySelectorAll('.map-card, .map-arrow, .map-arrow-double').forEach(el => el.remove());

  const room = ROOMS[currentRoom];
  if (!room) return;

  // Clear fog: add current room + only concepts linked in its TEXT
  // (not all doorways — you discover Attention through Self-Attention, not directly)
  explored.add(currentRoom);
  const textLinks = (room.text.match(/navigateTo\('([^']+)'\)/g) || [])
    .map(m => m.match(/navigateTo\('([^']+)'\)/)[1]);
  textLinks.forEach(id => explored.add(id));

  // Assign persistent positions to any new nodes
  // Place new nodes relative to their FIRST explored neighbor
  const spacing = 220;
  explored.forEach(id => {
    if (nodePositions[id]) return; // already placed
    // Find a neighbor that's already placed
    const r = ROOMS[id];
    if (!r || !r.doorways) { nodePositions[id] = { x: Math.random()*400-200, y: Math.random()*400-200 }; return; }
    const placedNeighbor = r.doorways.find(d => nodePositions[d.id]);
    if (placedNeighbor) {
      const anchor = nodePositions[placedNeighbor.id];
      // Place at an angle from the anchor
      const existing = Object.values(nodePositions);
      let bestAngle = 0, bestDist = 0;
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
        const tx = anchor.x + Math.cos(a) * spacing;
        const ty = anchor.y + Math.sin(a) * spacing;
        const minDist = Math.min(...existing.map(p => Math.hypot(p.x - tx, p.y - ty)));
        if (minDist > bestDist) { bestDist = minDist; bestAngle = a; }
      }
      nodePositions[id] = {
        x: anchor.x + Math.cos(bestAngle) * spacing,
        y: anchor.y + Math.sin(bestAngle) * spacing,
      };
    } else {
      nodePositions[id] = { x: Math.random()*400-200, y: Math.random()*400-200 };
    }
  });

  // Build edges from TEXT LINKS: if page A links to page B, arrow goes A → B
  const allEdges = [];
  const drawnPairs = new Set();
  explored.forEach(id => {
    const r = ROOMS[id];
    if (!r) return;
    const links = (r.text.match(/navigateTo\('([^']+)'\)/g) || [])
      .map(m => m.match(/navigateTo\('([^']+)'\)/)[1]);
    links.forEach(targetId => {
      if (explored.has(targetId)) {
        const key = id + '->' + targetId;
        if (!drawnPairs.has(key)) {
          drawnPairs.add(key);
          allEdges.push({ from: id, to: targetId });
        }
      }
    });
  });
  const cardW = 180, cardH = 65;
  const cx = W / 2, cy = H / 2;

  // Re-center: compute offset so current room is at screen center
  const curPos = nodePositions[currentRoom] || { x: 0, y: 0 };
  const offsetX = cx - curPos.x;
  const offsetY = cy - curPos.y;

  // Screen positions = persistent positions + offset
  const positions = {};
  explored.forEach(id => {
    if (!nodePositions[id]) return;
    positions[id] = {
      x: nodePositions[id].x + offsetX,
      y: nodePositions[id].y + offsetY,
    };
  });

  // Draw arrows: FROM → TO (the linking page points to the linked page)
  allEdges.forEach(e => {
    const pFrom = positions[e.from], pTo = positions[e.to];
    if (!pFrom || !pTo) return;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', pFrom.x); line.setAttribute('y1', pFrom.y);
    line.setAttribute('x2', pTo.x); line.setAttribute('y2', pTo.y);
    line.setAttribute('class', 'map-arrow');
    svg.appendChild(line);
  });

  // Draw cards for all explored nodes
  [...explored].forEach(id => {
    const pos = positions[id];
    if (!pos) return;
    const r = ROOMS[id];
    const isCurrent = id === currentRoom;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', `map-card${isCurrent ? ' current' : ''}`);
    g.setAttribute('transform', `translate(${pos.x - cardW/2}, ${pos.y - cardH/2})`);
    g.addEventListener('click', () => zoomIn(id));

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', cardW); rect.setAttribute('height', cardH);
    rect.setAttribute('fill', '#271B2F'); rect.setAttribute('stroke', isCurrent ? '#C49428' : '#4D355D');
    g.appendChild(rect);

    const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    name.setAttribute('class', 'mc-name');
    name.setAttribute('x', cardW/2); name.setAttribute('y', 28);
    name.setAttribute('text-anchor', 'middle');
    name.textContent = r ? r.name : id;
    g.appendChild(name);

    if (r && r.subtitle) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('class', 'mc-sub');
      sub.setAttribute('x', cardW/2); sub.setAttribute('y', 44);
      sub.setAttribute('text-anchor', 'middle');
      sub.textContent = r.subtitle.length > 28 ? r.subtitle.substring(0, 26) + '...' : r.subtitle;
      g.appendChild(sub);
    }

    svg.appendChild(g);
  });
}

function navigateTo(id) {
  if (!ROOMS[id]) return;
  explored.add(id);
  history.push(currentRoom);
  renderRoom(id);
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderRoom(prev);
}

// ─── ENTRY EXPERIENCE ────────────────────────────────────────────────────────

// Hide room behind overlay on load
document.getElementById('room').style.display = 'none';
document.getElementById('zoom-out-btn').style.display = 'none';

document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleQuery(e.target.value.trim());
});

document.querySelectorAll('.sp-link').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('search-box').value = el.dataset.q;
    handleQuery(el.dataset.q);
  });
});

document.getElementById('skip-link').addEventListener('click', () => {
  dismissOverlay();
  renderRoom('transformers');
});

function handleQuery(text) {
  if (!text) return;
  // Check for exact room match
  const lower = text.toLowerCase();
  const match = Object.values(ROOMS).find(r =>
    r.name.toLowerCase() === lower ||
    r.name.toLowerCase().includes(lower)
  );
  if (match) {
    dismissOverlay();
    const id = Object.keys(ROOMS).find(k => ROOMS[k] === match);
    renderRoom(id);
    return;
  }
  // Hardcoded sample queries
  if (lower.includes('chatgpt')) {
    dismissOverlay();
    renderRoom('transformers');
  } else if (lower.includes('rlhf') || lower.includes('sycophancy')) {
    dismissOverlay();
    renderRoom('transformers'); // placeholder — RLHF room doesn't exist yet
  } else if (lower.includes('ai')) {
    dismissOverlay();
    renderRoom('transformers'); // placeholder for "What even is AI?"
  } else {
    dismissOverlay();
    renderRoom('transformers');
  }
}

function dismissOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('room').style.display = 'flex';
  document.getElementById('zoom-out-btn').style.display = 'flex';
}

// ─── INIT ────────────────────────────────────────────────────────────────────

// Don't render room on load — overlay handles first navigation
</script>
