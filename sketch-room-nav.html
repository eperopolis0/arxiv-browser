<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Nav — Concept Sketch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #403151;
  color: #F1F0DE;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ── Room container ───────────────────────────── */
#room {
  display: flex;
  height: calc(100vh - 60px);
  margin-top: 60px;
  transition: opacity .3s;
}

/* (old #explainer removed — content now in #pane-explainer) */
/* ── Content text ─────────────────────────────── */
#concept-text {
  font-size: 22px; color: #F1F0DE; line-height: 1.75;
}
#concept-text a {
  color: #D7C4E3; text-decoration: none;
  border-bottom: 1px solid #B490CB;
  cursor: pointer;
  font-weight: 500;
}
#concept-text a:hover { color: #FFFFFF; border-bottom-color: #F1F0DE; }

/* ── Right: Resource bands ────────────────────── */
/* ── Sidebar strip (right side, 1/4 viewport) ─── */
#icon-strip {
  width: 25vw; flex-shrink: 0;
  display: flex; flex-direction: column;
  gap: 4px; padding: 4px;
  border-left: 1px solid #4D355D;
  background: #271B2F;
}
.icon-tab {
  flex: 1;
  cursor: pointer;
  transition: all .2s;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
}
.icon-tab:hover { border-color: #74508B; }
.icon-tab.active { border-color: #C49428; }

/* Depth gradient backgrounds */
.icon-tab-noob   { background: #4D355D; }
.icon-tab-mid    { background: #3a2845; }
.icon-tab-expert { background: #271B2F; }

/* Mini thumbnail — dimmed by default, bright on hover/active */
.tab-thumb {
  position: absolute; inset: 0;
  overflow: hidden;
  border-radius: 4px;
}
.tab-thumb img {
  width: 100%; height: 100%;
  object-fit: contain;
  background: #000;
  opacity: .4;
  transition: opacity .2s;
}
.icon-tab:hover .tab-thumb img,
.icon-tab.active .tab-thumb img { opacity: .85; }
.tab-thumb iframe {
  width: 1600px; height: 1000px;
  transform: scale(0.28);
  transform-origin: top left;
  pointer-events: none;
  border: none;
  opacity: .35;
  transition: opacity .2s;
}
.icon-tab:hover .tab-thumb iframe,
.icon-tab.active .tab-thumb iframe { opacity: .8; }

/* Overlaid metadata text */
.tab-meta {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,.75));
  z-index: 2;
}
.tab-meta-label {
  font-size: 14px; color: #F1F0DE; font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
}
.tab-meta-source {
  font-size: 11px; color: #B490CB;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
}

/* ── Content area ─────────────────────────────── */
#content-area {
  flex: 1; min-width: 0;
  position: relative;
  overflow: hidden;
}
.content-pane {
  position: absolute; inset: 0;
  display: none;
  overflow: auto;
}
.content-pane.active { display: block; }

/* Whoosh animation: pane starts at thumbnail position, expands to fill */
.content-pane.whooshing {
  display: block;
  transition: all .35s cubic-bezier(.22,.8,.36,1);
}

#pane-explainer { padding: 48px 48px 48px 56px; }
.content-pane iframe {
  width: 100%; height: 100%; border: none;
}
.paper-link:hover { color: #F1F0DE; border-color: #9B6BBA; }

/* ── Entry overlay ────────────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(39,27,47,.85);
  backdrop-filter: blur(4px);
}
#overlay.hidden { display: none; }
#search-box {
  width: 640px; padding: 18px 24px;
  font-size: 22px; color: #F1F0DE;
  background: #271B2F; border: 1.5px solid #4D355D;
  border-radius: 12px; outline: none;
  font-family: inherit;
}
#search-box::placeholder { color: #74508B; }
#search-box:focus { border-color: #9B6BBA; }
#sample-prompts { margin-top: 16px; text-align: center; }
.sp-label { font-size: 14px; color: #74508B; margin-bottom: 10px; }
.sp-link {
  display: block; font-size: 18px; color: #B490CB;
  cursor: pointer; padding: 5px 0;
  transition: color .12s;
}
.sp-link:hover { color: #F1F0DE; }
#skip-link {
  margin-top: 24px; font-size: 12px; color: #4D355D;
  cursor: pointer; transition: color .12s;
}
#skip-link:hover { color: #74508B; }

/* ── Title bar (always visible at top) ─────────── */
#title-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 60px; z-index: 20;
  background: #271B2F;
  border-bottom: 1px solid #4D355D;
  display: none; align-items: center;
  padding: 0 20px;
  gap: 12px;
}
#title-bar.visible { display: flex; }
#tb-name { font-size: 32px; font-weight: 600; color: #C49428; font-family: Georgia, 'Argent CF', serif; }
#tb-subtitle { font-size: 22px; color: #D7C4E3; font-style: italic; }
#zoom-out-btn {
  background: none; border: 1px solid #4D355D;
  color: #74508B; width: 32px; height: 32px;
  border-radius: 6px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
#zoom-out-btn:hover { border-color: #9B6BBA; color: #F1F0DE; }

/* ── Map view (zoom out) ──────────────────────── */
#map-view {
  display: none;
  position: fixed; inset: 0;
  background: #403151;
  z-index: 50;
  overflow: hidden;
}
#map-svg {
  width: 100%; height: 100%;
}
.map-card {
  cursor: pointer;
}
.map-card rect {
  rx: 8; ry: 8;
  transition: stroke .15s, fill .15s;
}
.map-card:hover rect { stroke: #9B6BBA; fill: #352845; }
.map-card .mc-name { font-size: 15px; fill: #F1F0DE; font-weight: 600; font-family: sans-serif; }
.map-card .mc-sub { font-size: 11px; fill: #74508B; font-family: sans-serif; }
.map-card.current rect { stroke: #C49428; stroke-width: 2; }
.map-card.current .mc-name { fill: #C49428; }
.map-arrow { fill: none; stroke: #74508B; stroke-width: 1.5; marker-end: url(#arrowhead); }
.map-arrow-double { fill: none; stroke: #5899DA; stroke-width: 1.5;
  marker-start: url(#arrowhead-rev); marker-end: url(#arrowhead); }
</style>
</head>
<body>

<div id="overlay">
  <input id="search-box" type="text" placeholder="Ask anything about AI" autocomplete="off">
  <div id="sample-prompts">
    <div class="sp-label">or try:</div>
    <a class="sp-link" data-q="Does RLHF cause sycophancy?">"Does RLHF cause sycophancy?"</a>
    <a class="sp-link" data-q="How does ChatGPT actually work?">"How does ChatGPT actually work?"</a>
    <a class="sp-link" data-q="What even is AI?">"What even is AI?"</a>
  </div>
  <div id="skip-link">or just explore →</div>
</div>

<div id="title-bar">
  <button id="zoom-out-btn" onclick="zoomOut()" title="See connections">⊞</button>
  <div id="tb-name"></div>
  <div id="tb-subtitle"></div>
</div>

<div id="map-view">
  <svg id="map-svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#74508B"/>
      </marker>
      <marker id="arrowhead-rev" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
        <polygon points="10 0, 0 3.5, 10 7" fill="#5899DA"/>
      </marker>
    </defs>
  </svg>
</div>

<div id="room">
  <div id="content-area">
    <div id="pane-explainer" class="content-pane active">
      <div id="concept-text"></div>
    </div>
    <!-- resource panes injected by JS -->
  </div>
  <div id="icon-strip"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const ROOMS = {
  transformers: {
    name: 'Transformers',
    subtitle: 'the architecture behind ChatGPT',
    text: `Before Transformers, AI models that processed language had to read words one at a time, like a person scanning a sentence left to right. This made them slow and forgetful — by the time they reached the end of a long paragraph, they'd often lost track of the beginning.<br><br>Transformers changed that completely. Instead of reading sequentially, a Transformer looks at every word in a passage simultaneously and figures out which words are most important to each other. The word "it" in a sentence might strongly connect to "the cat" three sentences earlier — a Transformer can see that connection instantly.<br><br>This ability is called <a href="javascript:void(0)" onclick="navigateTo('self-attention')">self-attention</a>, and it's the core innovation. It lets Transformers process language in parallel (making them fast) while keeping track of long-range connections (making them smart).<br><br>Transformers are the foundation of every major AI language model: <a href="javascript:void(0)" onclick="navigateTo('gpt')">GPT</a>, <a href="javascript:void(0)" onclick="navigateTo('bert')">BERT</a>, Claude, Gemini, Llama. They also power image generation, protein folding prediction, and many other breakthroughs. It's not an exaggeration to say they changed the entire field.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '30 min · video', source: '3Blue1Brown',
        preview: 'Visual walkthrough of how GPT works, starting from zero',
        ytId: 'wjZofJX0v4M',
        url: 'https://www.youtube.com/watch?v=wjZofJX0v4M' },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min · read', source: 'Jay Alammar',
        preview: 'Step-by-step diagrams of every Transformer component',
        embedUrl: 'https://jalammar.github.io/illustrated-transformer/',
        url: 'https://jalammar.github.io/illustrated-transformer/' },
      { level: 'expert', icon: '📄', label: 'Research', meta: '120k citations · paper', source: 'Vaswani et al. 2017',
        preview: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks...',
        abstract: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks that include an encoder and a decoder. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train.',
        url: 'https://arxiv.org/abs/1706.03762' },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'core component' },
      { id: 'gpt', name: 'GPT', rel: 'built on this' },
      { id: 'bert', name: 'BERT', rel: 'built on this' },
      { id: 'attention', name: 'Attention', rel: 'prerequisite' },
    ],
  },
  'self-attention': {
    name: 'Self-Attention',
    subtitle: 'how Transformers decide what matters',
    text: `Self-attention is the mechanism that makes <a href="javascript:void(0)" onclick="navigateTo('transformers')">Transformers</a> work. It answers a simple question: for each word in a sentence, which other words should it pay attention to?<br><br>Think of it like a group conversation. When someone says "she picked up the ball and threw it," your brain instantly connects "it" to "ball" and "she" to whoever was mentioned earlier. Self-attention does the same thing, but mathematically — it computes a score between every pair of words to figure out which connections matter most.<br><br>The "self" part means it's looking within the same text (as opposed to comparing two different texts). Every word gets to look at every other word and decide how much to care about it. Self-attention evolved from an earlier idea simply called <a href="javascript:void(0)" onclick="navigateTo('attention')">attention</a>, which was originally designed for translation.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '10 min · video', source: '3Blue1Brown (chapter)',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '8 min · read', source: 'Jay Alammar (section)',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: 'see Transformers paper', source: 'Vaswani et al.',
        extras: [
          { icon: '⚡', label: 'Quadratic memory bottleneck', meta: 'Consensus' },
        ]},
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
      { id: 'attention', name: 'Attention', rel: 'builds on' },
    ],
  },
  gpt: {
    name: 'GPT',
    subtitle: 'Generative Pre-trained Transformer',
    text: `GPT is an AI that predicts the next word. That's it — that's the core idea. You give it some text, and it guesses what comes next. Do that billions of times with internet text, and it learns an enormous amount about language, facts, and reasoning.<br><br>The "Generative" means it creates text. "Pre-trained" means it learns from a huge dataset before being specialized. "<a href="javascript:void(0)" onclick="navigateTo('transformers')">Transformer</a>" is the architecture it uses.<br><br>GPT is the technology behind ChatGPT. The key insight was that simple next-word prediction, scaled up massively, produces surprisingly capable and general-purpose AI systems.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '25 min · video', source: '3Blue1Brown',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '20 min · read', source: 'OpenAI blog',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '45k citations', source: 'Radford et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'bert', name: 'BERT', rel: 'alternative' },
    ],
  },
  bert: {
    name: 'BERT',
    subtitle: 'Bidirectional Encoder Representations from Transformers',
    text: `While <a href="javascript:void(0)" onclick="navigateTo('gpt')">GPT</a> reads text left to right (predicting the next word), BERT reads in both directions at once. It masks random words in a sentence and tries to fill in the blanks, learning to understand context from both sides.<br><br>This makes BERT especially good at understanding language — answering questions, classifying text, detecting sentiment — rather than generating it. BERT powered Google Search for years.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '10 min', source: 'Google AI blog',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min', source: 'Jay Alammar',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '95k citations', source: 'Devlin et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'gpt', name: 'GPT', rel: 'alternative' },
    ],
  },
  attention: {
    name: 'Attention',
    subtitle: 'the mechanism that started it all',
    text: `Before <a href="javascript:void(0)" onclick="navigateTo('self-attention')">self-attention</a>, there was plain attention. The original idea (2014) was simple: when translating a sentence from French to English, the model should be able to "look back" at the French words while generating each English word, focusing on the most relevant ones.<br><br>This solved a huge problem with earlier approaches that tried to compress an entire sentence into a single fixed-size vector. Attention lets the model selectively focus on different parts of the input for each part of the output.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '5 min', source: 'Our explainer',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '10 min', source: 'Distill.pub',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '40k citations', source: 'Bahdanau et al. 2014',
        extras: [] },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'evolved into' },
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
    ],
  },
};

// ─── STATE ───────────────────────────────────────────────────────────────────

let currentRoom = 'transformers';
let history = [];
const explored = new Set(['transformers']); // fog of war: concepts you've seen
const nodePositions = {}; // persistent positions: once placed, stays put
nodePositions['transformers'] = { x: 0, y: 0 }; // origin

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderRoom(id) {
  const room = ROOMS[id];
  if (!room) return;
  currentRoom = id;
  activePane = null;

  // Update title bar
  document.getElementById('tb-name').textContent = room.name;
  document.getElementById('tb-subtitle').textContent = room.subtitle || '';
  // (concept-name now lives in title-bar, set above)
  // subtitle now in title bar only
  document.getElementById('concept-text').innerHTML = room.text;

  // Icon strip + content panes
  const stripEl = document.getElementById('icon-strip');
  stripEl.innerHTML = '';
  const contentArea = document.getElementById('content-area');
  // Remove old resource panes (keep explainer)
  contentArea.querySelectorAll('.resource-pane').forEach(el => el.remove());
  // Reset to explainer
  document.getElementById('pane-explainer').classList.add('active');
  activePane = null;

  room.bands.forEach((b, i) => {
    const cls = b.level === 'noob' ? 'icon-tab-noob' : b.level === 'mid' ? 'icon-tab-mid' : 'icon-tab-expert';
    const tooltip = `${b.label} · ${b.source || ''} · ${b.meta}`;

    // Icon tab
    const tab = document.createElement('div');
    tab.className = `icon-tab ${cls}`;
    tab.dataset.idx = i;
    tab.dataset.tooltip = tooltip;
    // Mini thumbnail with overlaid metadata
    let thumbHTML = '';
    if (b.ytId) {
      thumbHTML = `<div class="tab-thumb"><img src="https://img.youtube.com/vi/${b.ytId}/mqdefault.jpg"></div>`;
    } else if (b.embedUrl) {
      thumbHTML = `<div class="tab-thumb"><iframe src="${b.embedUrl}" loading="lazy"></iframe></div>`;
    } else if (b.url && b.url.includes('arxiv')) {
      thumbHTML = `<div class="tab-thumb"><iframe src="${b.url.replace('/abs/','/pdf/')}" loading="lazy"></iframe></div>`;
    }
    const metaHTML = `<div class="tab-meta"><div class="tab-meta-label">${b.label}</div><div class="tab-meta-source">${b.source || ''} · ${b.meta}</div></div>`;
    tab.innerHTML = thumbHTML + metaHTML;
    tab.addEventListener('click', () => toggleResource(i));
    stripEl.appendChild(tab);

    // Resource pane (preloaded)
    const pane = document.createElement('div');
    pane.className = 'content-pane resource-pane';
    pane.id = `pane-resource-${i}`;
    if (b.ytId) {
      pane.innerHTML = `<iframe src="https://www.youtube.com/embed/${b.ytId}?rel=0" allowfullscreen></iframe>`;
    } else if (b.embedUrl) {
      pane.innerHTML = `<iframe src="${b.embedUrl}"></iframe>`;
    } else if (b.url && b.url.includes('arxiv')) {
      pane.innerHTML = `<iframe src="${b.url.replace('/abs/','/pdf/')}"></iframe>`;
    }
    contentArea.appendChild(pane);
  });

  // Scroll explainer to top
  document.getElementById('pane-explainer').scrollTop = 0;
}

let activePane = null;

function toggleResource(idx) {
  const panes = document.querySelectorAll('.content-pane');
  const tabs = document.querySelectorAll('.icon-tab');
  const contentArea = document.getElementById('content-area');

  if (activePane === idx) {
    // Deselect — return to explainer
    panes.forEach(p => { p.classList.remove('active', 'whooshing'); p.style.cssText = ''; });
    document.getElementById('pane-explainer').classList.add('active');
    tabs.forEach(t => t.classList.remove('active'));
    activePane = null;
  } else {
    // Get the thumbnail's position relative to content area
    const tab = tabs[idx];
    const tabRect = tab.getBoundingClientRect();
    const areaRect = contentArea.getBoundingClientRect();

    // Hide all panes
    panes.forEach(p => { p.classList.remove('active', 'whooshing'); p.style.cssText = ''; });
    tabs.forEach(t => t.classList.remove('active'));

    const pane = document.getElementById(`pane-resource-${idx}`);
    if (!pane) return;

    // Start at thumbnail position
    const startX = tabRect.left - areaRect.left;
    const startY = tabRect.top - areaRect.top;
    const startW = tabRect.width;
    const startH = tabRect.height;

    pane.style.left = startX + 'px';
    pane.style.top = startY + 'px';
    pane.style.width = startW + 'px';
    pane.style.height = startH + 'px';
    pane.style.borderRadius = '6px';
    pane.style.overflow = 'hidden';
    pane.classList.add('whooshing');

    // Force reflow, then animate to full size
    pane.offsetHeight;
    pane.style.left = '0';
    pane.style.top = '0';
    pane.style.width = '100%';
    pane.style.height = '100%';
    pane.style.borderRadius = '0';

    // After animation, switch to normal active state
    setTimeout(() => {
      pane.classList.remove('whooshing');
      pane.classList.add('active');
      pane.style.cssText = '';
    }, 360);

    tabs[idx]?.classList.add('active');
    activePane = idx;
  }
}

function playVideo(overlay) {
  const iframe = overlay.parentElement.querySelector('.yt-embed');
  if (iframe && iframe.dataset.src) {
    iframe.src = iframe.dataset.src; // swap to autoplay URL
    iframe.style.pointerEvents = 'auto';
  }
  overlay.style.display = 'none';
}

// ─── ZOOM OUT VIEW ───────────────────────────────────────────────────────────

function zoomOut() {
  document.getElementById('room').style.display = 'none';
  document.getElementById('title-bar').classList.remove('visible');
  document.getElementById('map-view').style.display = 'block';
  renderLocalMap();
}

function zoomIn(id) {
  document.getElementById('map-view').style.display = 'none';
  document.getElementById('title-bar').classList.add('visible');
  if (id === currentRoom) {
    // Same room — just restore (state preserved)
    document.getElementById('room').style.display = 'flex';
  } else {
    document.getElementById('room').style.display = 'flex';
    navigateTo(id);
  }
}

function renderLocalMap() {
  const svg = document.getElementById('map-svg');
  const W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Clear previous
  svg.querySelectorAll('.map-card, .map-arrow, .map-arrow-double').forEach(el => el.remove());

  const room = ROOMS[currentRoom];
  if (!room) return;

  // Clear fog: add current room + only concepts linked in its TEXT
  // (not all doorways — you discover Attention through Self-Attention, not directly)
  explored.add(currentRoom);
  const textLinks = (room.text.match(/navigateTo\('([^']+)'\)/g) || [])
    .map(m => m.match(/navigateTo\('([^']+)'\)/)[1]);
  textLinks.forEach(id => explored.add(id));

  // Assign persistent positions to any new nodes
  // Place new nodes relative to their FIRST explored neighbor
  const spacing = 220;
  explored.forEach(id => {
    if (nodePositions[id]) return; // already placed
    // Find a neighbor that's already placed
    const r = ROOMS[id];
    if (!r || !r.doorways) { nodePositions[id] = { x: Math.random()*400-200, y: Math.random()*400-200 }; return; }
    const placedNeighbor = r.doorways.find(d => nodePositions[d.id]);
    if (placedNeighbor) {
      const anchor = nodePositions[placedNeighbor.id];
      // Place at an angle from the anchor
      const existing = Object.values(nodePositions);
      let bestAngle = 0, bestDist = 0;
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
        const tx = anchor.x + Math.cos(a) * spacing;
        const ty = anchor.y + Math.sin(a) * spacing;
        const minDist = Math.min(...existing.map(p => Math.hypot(p.x - tx, p.y - ty)));
        if (minDist > bestDist) { bestDist = minDist; bestAngle = a; }
      }
      nodePositions[id] = {
        x: anchor.x + Math.cos(bestAngle) * spacing,
        y: anchor.y + Math.sin(bestAngle) * spacing,
      };
    } else {
      nodePositions[id] = { x: Math.random()*400-200, y: Math.random()*400-200 };
    }
  });

  // Build edges from TEXT LINKS: if page A links to page B, arrow goes A → B
  const allEdges = [];
  const drawnPairs = new Set();
  explored.forEach(id => {
    const r = ROOMS[id];
    if (!r) return;
    const links = (r.text.match(/navigateTo\('([^']+)'\)/g) || [])
      .map(m => m.match(/navigateTo\('([^']+)'\)/)[1]);
    links.forEach(targetId => {
      if (explored.has(targetId)) {
        const key = id + '->' + targetId;
        if (!drawnPairs.has(key)) {
          drawnPairs.add(key);
          allEdges.push({ from: id, to: targetId });
        }
      }
    });
  });
  const cardW = 180, cardH = 65;
  const cx = W / 2, cy = H / 2;

  // Re-center: compute offset so current room is at screen center
  const curPos = nodePositions[currentRoom] || { x: 0, y: 0 };
  const offsetX = cx - curPos.x;
  const offsetY = cy - curPos.y;

  // Screen positions = persistent positions + offset
  const positions = {};
  explored.forEach(id => {
    if (!nodePositions[id]) return;
    positions[id] = {
      x: nodePositions[id].x + offsetX,
      y: nodePositions[id].y + offsetY,
    };
  });

  // Draw arrows: FROM → TO (the linking page points to the linked page)
  allEdges.forEach(e => {
    const pFrom = positions[e.from], pTo = positions[e.to];
    if (!pFrom || !pTo) return;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', pFrom.x); line.setAttribute('y1', pFrom.y);
    line.setAttribute('x2', pTo.x); line.setAttribute('y2', pTo.y);
    line.setAttribute('class', 'map-arrow');
    svg.appendChild(line);
  });

  // Draw cards for all explored nodes
  [...explored].forEach(id => {
    const pos = positions[id];
    if (!pos) return;
    const r = ROOMS[id];
    const isCurrent = id === currentRoom;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', `map-card${isCurrent ? ' current' : ''}`);
    g.setAttribute('transform', `translate(${pos.x - cardW/2}, ${pos.y - cardH/2})`);
    g.addEventListener('click', () => zoomIn(id));

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', cardW); rect.setAttribute('height', cardH);
    rect.setAttribute('fill', '#271B2F'); rect.setAttribute('stroke', isCurrent ? '#C49428' : '#4D355D');
    g.appendChild(rect);

    const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    name.setAttribute('class', 'mc-name');
    name.setAttribute('x', cardW/2); name.setAttribute('y', 28);
    name.setAttribute('text-anchor', 'middle');
    name.textContent = r ? r.name : id;
    g.appendChild(name);

    if (r && r.subtitle) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('class', 'mc-sub');
      sub.setAttribute('x', cardW/2); sub.setAttribute('y', 44);
      sub.setAttribute('text-anchor', 'middle');
      sub.textContent = r.subtitle.length > 28 ? r.subtitle.substring(0, 26) + '...' : r.subtitle;
      g.appendChild(sub);
    }

    svg.appendChild(g);
  });
}

function navigateTo(id) {
  if (!ROOMS[id]) return;
  explored.add(id);
  history.push(currentRoom);
  renderRoom(id);
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderRoom(prev);
}

// ─── ENTRY EXPERIENCE ────────────────────────────────────────────────────────

// Hide room behind overlay on load
document.getElementById('room').style.display = 'none';
document.getElementById('zoom-out-btn').style.display = 'none';

document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleQuery(e.target.value.trim());
});

document.querySelectorAll('.sp-link').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('search-box').value = el.dataset.q;
    handleQuery(el.dataset.q);
  });
});

document.getElementById('skip-link').addEventListener('click', () => {
  dismissOverlay();
  renderRoom('transformers');
});

function handleQuery(text) {
  if (!text) return;
  // Check for exact room match
  const lower = text.toLowerCase();
  const match = Object.values(ROOMS).find(r =>
    r.name.toLowerCase() === lower ||
    r.name.toLowerCase().includes(lower)
  );
  if (match) {
    dismissOverlay();
    const id = Object.keys(ROOMS).find(k => ROOMS[k] === match);
    renderRoom(id);
    return;
  }
  // Hardcoded sample queries
  if (lower.includes('chatgpt')) {
    dismissOverlay();
    renderRoom('transformers');
  } else if (lower.includes('rlhf') || lower.includes('sycophancy')) {
    dismissOverlay();
    renderRoom('transformers'); // placeholder — RLHF room doesn't exist yet
  } else if (lower.includes('ai')) {
    dismissOverlay();
    renderRoom('transformers'); // placeholder for "What even is AI?"
  } else {
    dismissOverlay();
    renderRoom('transformers');
  }
}

function dismissOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('room').style.display = 'flex';
  document.getElementById('title-bar').classList.add('visible');
}

// ─── INIT ────────────────────────────────────────────────────────────────────

// Don't render room on load — overlay handles first navigation
</script>
