<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Nav — Concept Sketch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #403151;
  color: #F1F0DE;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ── Room container ───────────────────────────── */
#room {
  display: flex;
  height: 100vh;
  transition: opacity .3s;
}

/* ── Left: Explainer ──────────────────────────── */
#explainer {
  flex: 1;
  padding: 48px 48px 48px 56px;
  overflow-y: auto;
  min-width: 0;
  transition: all .35s ease;
  transform: translateX(0);
  opacity: 1;
}
#concept-name {
  font-size: 36px; font-weight: 600; color: #C49428;
  margin-bottom: 6px;
}
#concept-subtitle {
  font-size: 14px; color: #74508B; margin-bottom: 24px;
  font-style: italic;
}
#concept-text {
  font-size: 18px; color: #F1F0DE; line-height: 1.75;
}
#concept-text a {
  color: #9B6BBA; text-decoration: none;
  border-bottom: 1px dotted #74508B;
  cursor: pointer;
}
#concept-text a:hover { color: #F1F0DE; border-bottom-color: #F1F0DE; }

/* ── Right: Resource bands ────────────────────── */
#bands {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-left: 1px solid #4D355D;
  transition: width .35s ease;
}

.band {
  flex: 1;
  padding: 20px 24px;
  display: flex; flex-direction: column;
  justify-content: center;
  cursor: pointer;
  transition: all .35s ease;
  position: relative;
  overflow: hidden;
}
.band:hover { filter: brightness(1.12); }

.band-noob   { background: #4D355D; }
.band-mid    { background: #3a2845; }
.band-expert { background: #271B2F; }

/* Band preview (collapsed state) */
.band-icon { font-size: 24px; margin-bottom: 6px; }
.band-label { font-size: 16px; font-weight: 600; color: #F1F0DE; margin-bottom: 3px; }
.band-meta { font-size: 14px; color: #B490CB; }
.band-source { font-size: 13px; color: #74508B; margin-top: 4px; }
.band-preview { font-size: 13px; color: #9B6BBA; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Band content — ALWAYS visible, clipped in collapsed state */
.band-content {
  margin-top: 10px; flex: 1; min-height: 0;
  overflow: hidden; border-radius: 6px;
  position: relative;
}
.band-content iframe {
  width: 100%; border: none; border-radius: 6px;
  pointer-events: none;
}
.band-content .yt-embed { aspect-ratio: 16/9; background: #000; }
.band-content .blog-embed { height: 300px; background: #fff; }
.band-content .pdf-embed { height: 300px; background: #fff; }

/* Play button overlay for video */
.play-overlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; z-index: 2;
  background: rgba(0,0,0,.25); transition: background .15s;
}
.play-overlay:hover { background: rgba(0,0,0,.1); }
.play-btn {
  width: 48px; height: 48px; background: rgba(196,148,40,.9);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.play-btn::after {
  content: ''; width: 0; height: 0;
  border-left: 16px solid #271B2F; border-top: 10px solid transparent; border-bottom: 10px solid transparent;
  margin-left: 3px;
}

/* ── Expanded state (90% takeover) ────────────── */
#room.band-expanded #explainer {
  flex: 0 0 48px;
  padding: 0; overflow: hidden;
  transition: all .35s ease;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid #4D355D;
  cursor: pointer;
}
#room.band-expanded #explainer #concept-text,
#room.band-expanded #explainer #concept-subtitle { display: none; }
#room.band-expanded #explainer #concept-name {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 16px; margin: 0; transform: rotate(180deg);
}
#room.band-expanded #bands {
  width: 100%; border-left: none;
}

/* Collapsed band = thin tab strip */
#room.band-expanded .band {
  flex: 0 0 44px;
  padding: 10px 14px;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  justify-content: flex-start;
}
#room.band-expanded .band .band-preview,
#room.band-expanded .band .band-source,
#room.band-expanded .band .band-meta,
#room.band-expanded .band .band-content { display: none; }
#room.band-expanded .band.active .band-content { display: flex; flex-direction: column; }
#room.band-expanded .band .band-icon { margin-bottom: 0; font-size: 18px; }
#room.band-expanded .band .band-label { margin-bottom: 0; font-size: 13px; }

/* The active expanded band */
#room.band-expanded .band.active {
  flex: 1;
  padding: 24px 32px;
  flex-direction: column;
  align-items: stretch;
  cursor: default;
}
#room.band-expanded .band.active .band-preview { display: none; }
#room.band-expanded .band.active .band-source { display: block; }
#room.band-expanded .band.active .band-meta { display: block; font-size: 14px; }
#room.band-expanded .band.active .band-icon { margin-bottom: 6px; font-size: 24px; }
#room.band-expanded .band.active .band-label { margin-bottom: 3px; font-size: 18px; }
#room.band-expanded .band.active .band-content {
  flex: 1; overflow: visible;
}
#room.band-expanded .band.active .band-content iframe {
  pointer-events: auto; height: 100%;
}
#room.band-expanded .band.active .band-content .yt-embed { height: 100%; }
#room.band-expanded .band.active .play-overlay { display: none; }
#room.band-expanded .band.active .band-preview { display: none; }

/* Back to overview button */
.band-back {
  display: none; font-size: 12px; color: #74508B;
  cursor: pointer; margin-bottom: 12px; transition: color .12s;
}
.band-back:hover { color: #F1F0DE; }
#room.band-expanded .band.active .band-back { display: block; }

/* YouTube embed */
.yt-embed {
  width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px;
  background: #000;
}
/* Blog iframe */
.blog-embed {
  width: 100%; flex: 1; border: none; border-radius: 8px;
  background: #FFF; min-height: 400px;
}
/* Paper abstract */
.paper-abstract {
  font-size: 15px; color: #D7C4E3; line-height: 1.65; margin-bottom: 16px;
}
.paper-link {
  display: inline-block; font-size: 14px; color: #9B6BBA;
  border: 1px solid #4D355D; padding: 6px 14px; border-radius: 6px;
  text-decoration: none; transition: all .12s;
}
.paper-link:hover { color: #F1F0DE; border-color: #9B6BBA; }

/* (breadcrumb bar removed — left panel IS the nav) */
</style>
</head>
<body>

<div id="room">
  <div id="explainer">
    <div id="concept-name"></div>
    <div id="concept-subtitle"></div>
    <div id="concept-text"></div>
  </div>
  <div id="bands"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const ROOMS = {
  transformers: {
    name: 'Transformers',
    subtitle: 'the architecture behind ChatGPT',
    text: `Before Transformers, AI models that processed language had to read words one at a time, like a person scanning a sentence left to right. This made them slow and forgetful — by the time they reached the end of a long paragraph, they'd often lost track of the beginning.<br><br>Transformers changed that completely. Instead of reading sequentially, a Transformer looks at every word in a passage simultaneously and figures out which words are most important to each other. The word "it" in a sentence might strongly connect to "the cat" three sentences earlier — a Transformer can see that connection instantly.<br><br>This ability is called <a onclick="navigateTo('self-attention')">self-attention</a>, and it's the core innovation. It lets Transformers process language in parallel (making them fast) while keeping track of long-range connections (making them smart).<br><br>Transformers are the foundation of every major AI language model: <a onclick="navigateTo('gpt')">GPT</a>, <a onclick="navigateTo('bert')">BERT</a>, Claude, Gemini, Llama. They also power image generation, protein folding prediction, and many other breakthroughs. It's not an exaggeration to say they changed the entire field.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '30 min · video', source: '3Blue1Brown',
        preview: 'Visual walkthrough of how GPT works, starting from zero',
        ytId: 'wjZofJX0v4M',
        url: 'https://www.youtube.com/watch?v=wjZofJX0v4M' },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min · read', source: 'Jay Alammar',
        preview: 'Step-by-step diagrams of every Transformer component',
        embedUrl: 'https://jalammar.github.io/illustrated-transformer/',
        url: 'https://jalammar.github.io/illustrated-transformer/' },
      { level: 'expert', icon: '📄', label: 'Research', meta: '120k citations · paper', source: 'Vaswani et al. 2017',
        preview: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks...',
        abstract: 'The dominant sequence transduction models are based on complex recurrent or convolutional neural networks that include an encoder and a decoder. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train.',
        url: 'https://arxiv.org/abs/1706.03762' },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'core component' },
      { id: 'gpt', name: 'GPT', rel: 'built on this' },
      { id: 'bert', name: 'BERT', rel: 'built on this' },
      { id: 'attention', name: 'Attention', rel: 'prerequisite' },
    ],
  },
  'self-attention': {
    name: 'Self-Attention',
    subtitle: 'how Transformers decide what matters',
    text: `Self-attention is the mechanism that makes <a onclick="navigateTo('transformers')">Transformers</a> work. It answers a simple question: for each word in a sentence, which other words should it pay attention to?<br><br>Think of it like a group conversation. When someone says "she picked up the ball and threw it," your brain instantly connects "it" to "ball" and "she" to whoever was mentioned earlier. Self-attention does the same thing, but mathematically — it computes a score between every pair of words to figure out which connections matter most.<br><br>The "self" part means it's looking within the same text (as opposed to comparing two different texts). Every word gets to look at every other word and decide how much to care about it.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '10 min · video', source: '3Blue1Brown (chapter)',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '8 min · read', source: 'Jay Alammar (section)',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: 'see Transformers paper', source: 'Vaswani et al.',
        extras: [
          { icon: '⚡', label: 'Quadratic memory bottleneck', meta: 'Consensus' },
        ]},
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
      { id: 'attention', name: 'Attention', rel: 'builds on' },
    ],
  },
  gpt: {
    name: 'GPT',
    subtitle: 'Generative Pre-trained Transformer',
    text: `GPT is an AI that predicts the next word. That's it — that's the core idea. You give it some text, and it guesses what comes next. Do that billions of times with internet text, and it learns an enormous amount about language, facts, and reasoning.<br><br>The "Generative" means it creates text. "Pre-trained" means it learns from a huge dataset before being specialized. "<a onclick="navigateTo('transformers')">Transformer</a>" is the architecture it uses.<br><br>GPT is the technology behind ChatGPT. The key insight was that simple next-word prediction, scaled up massively, produces surprisingly capable and general-purpose AI systems.`,
    bands: [
      { level: 'noob', icon: '🎥', label: 'Watch', meta: '25 min · video', source: '3Blue1Brown',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '20 min · read', source: 'OpenAI blog',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '45k citations', source: 'Radford et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'bert', name: 'BERT', rel: 'alternative' },
    ],
  },
  bert: {
    name: 'BERT',
    subtitle: 'Bidirectional Encoder Representations from Transformers',
    text: `While <a onclick="navigateTo('gpt')">GPT</a> reads text left to right (predicting the next word), BERT reads in both directions at once. It masks random words in a sentence and tries to fill in the blanks, learning to understand context from both sides.<br><br>This makes BERT especially good at understanding language — answering questions, classifying text, detecting sentiment — rather than generating it. BERT powered Google Search for years.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '10 min', source: 'Google AI blog',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '15 min', source: 'Jay Alammar',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '95k citations', source: 'Devlin et al. 2018',
        extras: [] },
    ],
    doorways: [
      { id: 'transformers', name: 'Transformers', rel: 'built on' },
      { id: 'gpt', name: 'GPT', rel: 'alternative' },
    ],
  },
  attention: {
    name: 'Attention',
    subtitle: 'the mechanism that started it all',
    text: `Before <a onclick="navigateTo('self-attention')">self-attention</a>, there was plain attention. The original idea (2014) was simple: when translating a sentence from French to English, the model should be able to "look back" at the French words while generating each English word, focusing on the most relevant ones.<br><br>This solved a huge problem with earlier approaches that tried to compress an entire sentence into a single fixed-size vector. Attention lets the model selectively focus on different parts of the input for each part of the output.`,
    bands: [
      { level: 'noob', icon: '📝', label: 'Read', meta: '5 min', source: 'Our explainer',
        extras: [] },
      { level: 'mid', icon: '📝', label: 'Read', meta: '10 min', source: 'Distill.pub',
        extras: [] },
      { level: 'expert', icon: '📄', label: 'Research', meta: '40k citations', source: 'Bahdanau et al. 2014',
        extras: [] },
    ],
    doorways: [
      { id: 'self-attention', name: 'Self-Attention', rel: 'evolved into' },
      { id: 'transformers', name: 'Transformers', rel: 'used in' },
    ],
  },
};

// ─── STATE ───────────────────────────────────────────────────────────────────

let currentRoom = 'transformers';
let history = [];
let expandedBand = null;

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderRoom(id) {
  const room = ROOMS[id];
  if (!room) return;
  currentRoom = id;
  expandedBand = null;
  document.getElementById('room').classList.remove('band-expanded');

  document.getElementById('concept-name').textContent = room.name;

  // Click the left panel when collapsed → return to overview
  document.getElementById('explainer').onclick = () => {
    if (document.getElementById('room').classList.contains('band-expanded')) {
      collapseAll();
    }
  };
  document.getElementById('concept-subtitle').textContent = room.subtitle;
  document.getElementById('concept-text').innerHTML = room.text;

  // Bands
  const bandsEl = document.getElementById('bands');
  bandsEl.innerHTML = '';
  const roomEl = document.getElementById('room');

  room.bands.forEach((b, i) => {
    const cls = b.level === 'noob' ? 'band-noob' : b.level === 'mid' ? 'band-mid' : 'band-expert';
    const band = document.createElement('div');
    band.className = `band ${cls}`;
    band.dataset.idx = i;

    // Build preloaded content (always visible, clipped)
    let contentHTML = '';
    if (b.ytId) {
      contentHTML = `
        <div class="play-overlay" onclick="event.stopPropagation();playVideo(this)"><div class="play-btn"></div></div>
        <iframe class="yt-embed" data-src="https://www.youtube.com/embed/${b.ytId}?rel=0&autoplay=1" src="https://www.youtube.com/embed/${b.ytId}?rel=0" allowfullscreen></iframe>`;
    } else if (b.embedUrl) {
      contentHTML = `<iframe class="blog-embed" src="${b.embedUrl}"></iframe>`;
    } else if (b.url && b.url.includes('arxiv')) {
      contentHTML = `<iframe class="pdf-embed" src="${b.url.replace('/abs/','/pdf/')}"></iframe>`;
    }

    band.innerHTML = `
      <div class="band-back" onclick="event.stopPropagation();collapseAll()">← Overview</div>
      <div class="band-icon">${b.icon}</div>
      <div class="band-label">${b.label}</div>
      <div class="band-meta">${b.meta}</div>
      ${b.source ? `<div class="band-source">${b.source}</div>` : ''}
      <div class="band-content">${contentHTML}</div>
    `;

    band.addEventListener('click', () => {
      if (band.classList.contains('active')) return;
      // Expand this band to 90%
      expandedBand = i;
      roomEl.classList.add('band-expanded');
      bandsEl.querySelectorAll('.band').forEach(el => el.classList.remove('active'));
      band.classList.add('active');
    });

    bandsEl.appendChild(band);
  });

  // (nav is the left panel itself — no separate breadcrumbs)

  // Scroll explainer to top
  document.getElementById('explainer').scrollTop = 0;
}

function collapseAll() {
  const roomEl = document.getElementById('room');
  roomEl.classList.remove('band-expanded');
  document.querySelectorAll('.band').forEach(el => el.classList.remove('active'));
  expandedBand = null;
}

function playVideo(overlay) {
  const iframe = overlay.parentElement.querySelector('.yt-embed');
  if (iframe && iframe.dataset.src) {
    iframe.src = iframe.dataset.src; // swap to autoplay URL
    iframe.style.pointerEvents = 'auto';
  }
  overlay.style.display = 'none';
}

function navigateTo(id) {
  if (!ROOMS[id]) return;
  history.push(currentRoom);
  renderRoom(id);
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  renderRoom(prev);
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderRoom('transformers');
</script>
</body>
</html>
