<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concept Map — AI/ML</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #403151; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

#tooltip {
  position: fixed; max-width: 300px;
  background: #271B2F; border: 1px solid #4D355D;
  color: #F1F0DE; font-size: 13px; line-height: 1.5;
  padding: 12px 16px; border-radius: 8px;
  pointer-events: none; opacity: 0;
  transition: opacity .15s; z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
#tooltip.visible { opacity: 1; }
.tt-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.tt-cluster { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.tt-def { color: #B490CB; }
.tt-year { font-size: 11px; color: #74508B; margin-top: 6px; }

#edge-tooltip {
  position: fixed; max-width: 300px;
  background: #271B2F; border: 1px solid #4D355D;
  color: #F1F0DE; font-size: 12px; line-height: 1.5;
  padding: 10px 14px; border-radius: 8px;
  pointer-events: none; opacity: 0;
  transition: opacity .15s; z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
#edge-tooltip.visible { opacity: 1; }

/* ── Persistent header bar ─────────────────────── */
#header-bar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 180;
  background: #271B2F;
  border-bottom: 1px solid #4D355D;
  display: none;
  flex-direction: column;
  padding: 10px 16px 8px;
}
#header-bar.visible { display: flex; }
#hdr-row1 { display: flex; align-items: center; gap: 12px; }
#hdr-wordmark { font-size: 14px; font-weight: 600; color: #C49428; letter-spacing: .03em; flex-shrink: 0; }
#hdr-search {
  flex: 1;
  padding: 12px 18px; font-size: 18px;
  color: #F1F0DE; background: #403151;
  border: 1px solid #4D355D; border-radius: 10px;
  outline: none; font-family: inherit;
}
#hdr-search::placeholder { color: #74508B; }
#hdr-search:focus { border-color: #9B6BBA; }
#hdr-home {
  background: none; border: 1px solid #4D355D; color: #74508B;
  padding: 6px 14px; border-radius: 6px; font-size: 12px;
  cursor: pointer; transition: all .12s; font-family: inherit; flex-shrink: 0;
}
#hdr-home:hover { border-color: #9B6BBA; color: #B490CB; }
#hdr-prompts {
  display: flex; gap: 16px; padding: 6px 0 0 0; margin-left: 100px;
}
.hdr-prompt {
  font-size: 12px; color: #74508B; cursor: pointer;
  transition: color .12s; text-decoration: none;
}
.hdr-prompt:hover { color: #B490CB; }

/* ── Entry overlay ─────────────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(39,27,47,.6);
  backdrop-filter: blur(2px);
  transition: opacity .4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#search-box {
  width: 640px; padding: 18px 24px;
  font-size: 22px; color: #F1F0DE;
  background: #271B2F; border: 1.5px solid #4D355D;
  border-radius: 12px; outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
#search-box::placeholder { color: #74508B; }
#search-box:focus { border-color: #9B6BBA; }
#sample-prompts { margin-top: 16px; text-align: center; }
#sample-prompts .sp-label { font-size: 14px; color: #74508B; margin-bottom: 10px; }
.sp-link {
  display: block; font-size: 18px; color: #B490CB;
  cursor: pointer; padding: 4px 0;
  transition: color .12s; text-decoration: none;
}
.sp-link:hover { color: #F1F0DE; }
#skip-link {
  margin-top: 24px; font-size: 11px; color: #4D355D;
  cursor: pointer; transition: color .12s;
}
#skip-link:hover { color: #74508B; }

/* ── Full concept card (two-panel) ──────────────── */
#info-panel {
  position: fixed; z-index: 150;
  top: 100px;
  width: 760px;
  background: #271B2F;
  border: 1.5px solid rgba(196,148,40,.5);
  border-radius: 12px;
  box-shadow: 0 8px 60px rgba(0,0,0,.6);
  display: none;
  overflow: visible;
}
#info-panel .ip-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: #4D355D; font-size: 18px;
  cursor: pointer; z-index: 5;
}
#info-panel .ip-close:hover { color: #B490CB; }
.ip-inner { display: flex; }
.ip-left { flex: 1; padding: 24px 28px; border-right: 1px solid #4D355D; }
.ip-right { width: 310px; flex-shrink: 0; display: flex; flex-direction: column; overflow: visible; }
.ip-name { font-size: 32px; font-weight: 600; color: #C49428; margin-bottom: 8px; }
.ip-def { font-size: 16px; color: #FFFFFF; line-height: 1.55; margin-bottom: 14px; }
.ip-intro { font-size: 16px; color: #D7C4E3; line-height: 1.55; }
.ip-papers-hdr { font-size: 10px; color: #74508B; text-transform: uppercase; letter-spacing: .12em; padding: 10px 16px 0; }
.ip-paper {
  flex: 1; padding: 12px 16px;
  border-bottom: 1px solid #4D355D;
  transition: background .12s;
  position: relative; overflow: visible;
}
.ip-paper:last-child { border-bottom: none; }
.ip-paper:hover { background: #352548; }
.ip-paper-row { display: flex; align-items: center; gap: 10px; }
.ip-avatar {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #FFFFFF; flex-shrink: 0;
}
.ip-paper-info { flex: 1; min-width: 0; }
.ip-paper-title { font-size: 14px; color: #F1F0DE; line-height: 1.35; text-decoration: none; display: block; }
.ip-paper-title:hover { text-decoration: underline; color: #FFF; }
.ip-paper-meta { font-size: 12px; color: #B490CB; margin-top: 2px; }
.ip-expand {
  color: #74508B; font-size: 16px; flex-shrink: 0;
  cursor: pointer; background: none; border: 1px solid #4D355D;
  border-radius: 4px; padding: 2px 8px; transition: color .12s;
}
.ip-expand:hover { color: #F1F0DE; border-color: #74508B; }
.ip-authors {
  position: absolute; left: 100%; top: 50%; margin-left: 12px;
  display: flex; gap: 6px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  transform: translateY(-50%) translateX(-10px); z-index: 20;
}
.ip-authors.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
.ip-auth-chip {
  display: flex; flex-direction: column; align-items: center;
  width: 56px; text-align: center;
}
.ip-auth-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #FFF; margin-bottom: 3px;
}
.ip-auth-name { font-size: 10px; color: #F1F0DE; line-height: 1.2; white-space: nowrap; }
.ip-auth-affil { font-size: 8px; color: #B490CB; line-height: 1.15; }
.ip-auth-affil-line { display: block; white-space: nowrap; }
.ip-auth-cite { font-size: 8px; color: #74508B; line-height: 1.15; margin-top: 1px; }

/* ── Claim card (edge zoom) ────────────────────── */
#claim-panel {
  position: fixed; z-index: 150;
  background: #271B2F; border: 1px solid #4D355D;
  border-radius: 10px; padding: 16px 20px;
  max-width: 400px; box-shadow: 0 4px 30px rgba(0,0,0,.5);
  display: none;
}
#claim-panel .cp-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
#claim-panel .cp-text { font-size: 14px; color: #F1F0DE; line-height: 1.55; margin-bottom: 10px; }
#claim-panel .cp-bar { display: flex; height: 7px; border-radius: 4px; overflow: hidden; background: #4D355D; margin-bottom: 6px; }
#claim-panel .cp-meta { font-size: 11px; color: #74508B; }
#claim-panel .cp-close {
  position: absolute; top: 8px; right: 12px;
  background: none; border: none; color: #4D355D; font-size: 16px;
  cursor: pointer;
}
#claim-panel .cp-close:hover { color: #B490CB; }

/* ── Path step card ────────────────────────────── */
#path-card {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 150;
  background: #271B2F; border: 1px solid #4D355D;
  border-radius: 10px; padding: 14px 22px;
  width: 520px; box-shadow: 0 4px 30px rgba(0,0,0,.5);
  display: none;
}
#path-card .pc-step { font-size: 10px; color: #74508B; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
#path-card .pc-name { font-size: 18px; font-weight: 600; color: #C49428; margin-bottom: 4px; }
#path-card .pc-desc { font-size: 14px; color: #F1F0DE; line-height: 1.5; margin-bottom: 12px; }
#path-card .pc-nav { display: flex; justify-content: space-between; align-items: center; }
.pc-btn {
  background: none; border: 1px solid #4D355D; color: #B490CB;
  padding: 6px 16px; border-radius: 6px; font-size: 12px;
  cursor: pointer; transition: all .12s; font-family: inherit;
}
.pc-btn:hover { border-color: #9B6BBA; color: #F1F0DE; }
.pc-btn:disabled { opacity: .3; cursor: default; }
.pc-dots { display: flex; gap: 6px; }
.pc-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4D355D; transition: background .15s;
}
.pc-dot.active { background: #C49428; }

/* Path node badges */
.path-badge {
  font-size: 11px; font-weight: 700;
  fill: #271B2F;
}
.path-badge-bg {
  fill: #C49428;
}
</style>
</head>
<body>
<div id="header-bar">
  <div id="hdr-row1">
    <span id="hdr-wordmark">Claim Tracker</span>
    <input id="hdr-search" type="text" placeholder="Ask anything about AI" autocomplete="off">
    <button id="hdr-home">Reset map</button>
  </div>
  <div id="hdr-prompts">
    <a class="hdr-prompt" data-q="Does RLHF cause sycophancy?">"Does RLHF cause sycophancy?"</a>
    <a class="hdr-prompt" data-q="How does ChatGPT actually work?">"How does ChatGPT actually work?"</a>
    <a class="hdr-prompt" data-q="What is RLHF?">"What is RLHF?"</a>
  </div>
</div>

<div id="overlay">
  <input id="search-box" type="text" placeholder="Ask anything about AI" autocomplete="off">
  <div id="sample-prompts">
    <div class="sp-label">or try:</div>
    <a class="sp-link" data-q="Does RLHF cause sycophancy?">"Does RLHF cause sycophancy?"</a>
    <a class="sp-link" data-q="How does ChatGPT actually work?">"How does ChatGPT actually work?"</a>
    <a class="sp-link" data-q="What is RLHF?">"What is RLHF?"</a>
  </div>
  <div id="skip-link">or just explore the map →</div>
</div>

<div id="info-panel">
  <button class="ip-close" onclick="closeInfoPanel()">×</button>
  <div class="ip-inner" id="ip-inner"></div>
</div>

<div id="claim-panel">
  <button class="cp-close" onclick="closeClaimPanel()">×</button>
  <div class="cp-type"></div>
  <div class="cp-text"></div>
  <div class="cp-bar"></div>
  <div class="cp-meta"></div>
</div>

<div id="path-card">
  <div class="pc-step"></div>
  <div class="pc-name"></div>
  <div class="pc-desc"></div>
  <div class="pc-nav">
    <button class="pc-btn" id="pc-prev" onclick="pathPrev()">← Prev</button>
    <div class="pc-dots" id="pc-dots"></div>
    <button class="pc-btn" id="pc-next" onclick="pathNext()">Next →</button>
  </div>
</div>

<div id="tooltip"></div>
<div id="edge-tooltip"></div>

const W = window.innerWidth, H = window.innerHeight;
const PAD = { l: 80, r: 160, t: 50, b: 40 };

function yearToX(year) {
  const eras = [[1847,.02],[1990,.08],[2010,.15],[2014,.28],[2017,.42],[2020,.58],[2022,.76],[2024,.94]];
  for (let i = 1; i < eras.length; i++) {
    if (year <= eras[i][0]) {
      const [y0,x0] = eras[i-1], [y1,x1] = eras[i];
      return PAD.l + (x0 + (year-y0)/(y1-y0) * (x1-x0)) * (W-PAD.l-PAD.r);
    }
  }
  return PAD.l + .94*(W-PAD.l-PAD.r);
}
function absToY(a) { return (H-PAD.b) - a*(H-PAD.t-PAD.b); }

// Positions with jitter
const used = [];
CONCEPTS.forEach(c => {
  let x = yearToX(c.year), y = absToY(c.abs);
  for (let i = 0; i < 15; i++) {
    if (!used.some(p => Math.hypot(x-p[0], y-p[1]) < 28)) break;
    x += (Math.random()-.5)*36; y += (Math.random()-.5)*28;
  }
  used.push([x,y]); c.x = x; c.y = y;
});

// Compute difficulty score

// Hover
function positionTip(el, ev) {
  el.style.left = (ev.clientX + 16) + 'px';
  // Check if tooltip would go below viewport
  const tipH = el.offsetHeight || 120;
  if (ev.clientY + tipH + 10 > window.innerHeight) {
    el.style.top = (ev.clientY - tipH - 10) + 'px';
  } else {
    el.style.top = (ev.clientY - 10) + 'px';
  }
}

const tooltip = document.getElementById('tooltip');
// Fog-aware hover
nodeG.on('mouseenter', (ev,d) => {
  // Fogged nodes: no interaction
  if (!explored.has(d.id) && !isAdjacentToExplored(d.id)) return;

  // Adjacent-to-explored: minimal tooltip
  if (!explored.has(d.id)) {
    tooltip.innerHTML = `<div class="tt-name" style="color:#74508B">???</div><div class="tt-def" style="color:#4D355D">Click to explore</div>`;
    positionTip(tooltip, ev);
    tooltip.classList.add('visible');
    return;
  }

  // Explored: full hover with fog-aware dimming
  const col = CLUSTER_COLORS[d.cluster];
  tooltip.innerHTML = `<div class="tt-name" style="color:${col}">${d.name}</div><div class="tt-cluster" style="color:${col}">${CLUSTER_LABELS[d.cluster]}</div><div class="tt-def">${d.definition}</div><div class="tt-year">~${d.year}</div>`;
  positionTip(tooltip, ev);
  tooltip.classList.add('visible');

  const nb = neighbors[d.id];
  nodeG.select('circle')
    .attr('fill', n => explored.has(n.id) || nb.has(n.id) ? CLUSTER_COLORS[n.cluster] : '#4D355D')
    .attr('fill-opacity', n => {
      if (n.id === d.id) return 1;
      if (nb.has(n.id) && explored.has(n.id)) return 0.85;
      if (nb.has(n.id)) return 0.2; // unexplored neighbor visible on hover
      if (explored.has(n.id)) return 0.2;
      return 0.02;
    })
    .attr('stroke-opacity', n => (n.id===d.id || nb.has(n.id)) ? 0.6 : 0.02);
  nodeG.select('text')
    .attr('opacity', n => {
      if (n.id === d.id) return 1;
      if (nb.has(n.id) && explored.has(n.id)) return 0.9;
      return 0;
    })
    .attr('font-size', n => (n.id===d.id || nb.has(n.id)) ? 14 : 9);
  svg.selectAll('.edge').each(function() {
    const idx = +this.dataset?.idx;
    if (isNaN(idx)) { d3.select(this).attr('opacity', 0); return; }
    const e = EDGES[idx];
    const connected = e && (e.s===d.id || e.t===d.id);
    const bothExplored = e && explored.has(e.s) && explored.has(e.t);
    d3.select(this).attr('opacity', connected && bothExplored ? 1 : 0);
  });
})
.on('mousemove', ev => {
  if (tooltip.classList.contains('visible')) positionTip(tooltip, ev);
})
.on('mouseleave', () => {
  tooltip.classList.remove('visible');
  applyFog(); // return to fog baseline
})

  if (explored.has(d.id)) {
    showConcept(d.id);
  } else if (isAdjacentToExplored(d.id)) {
    exploreNode(d.id);
  }
});

function isAdjacentToExplored(id) {
  const nb = neighbors[id];
  if (!nb) return false;
  for (const n of nb) { if (explored.has(n)) return true; }
  return false;
}

function exploreNode(id) {
  if (!cMap[id]) return;
  explored.add(id);
  applyFog();
}

function exploreNeighborhood(id) {
  if (!cMap[id]) return;
  explored.add(id);
  const nb = neighbors[id];
  if (nb) nb.forEach(n => explored.add(n));
  applyFog();
}

function applyFog() {
  nodeG.select('circle')
    .attr('fill', d => explored.has(d.id) ? CLUSTER_COLORS[d.cluster] : '#4D355D')
    .attr('fill-opacity', d => {
      if (explored.has(d.id)) return 0.9;
      if (isAdjacentToExplored(d.id)) return 0.15;
      return 0.04;
    })
    .attr('stroke', d => explored.has(d.id) ? CLUSTER_COLORS[d.cluster] : '#4D355D')
    .attr('stroke-opacity', d => explored.has(d.id) ? 0.3 : 0.02);

  nodeG.select('text')
    .attr('opacity', d => explored.has(d.id) ? (topSet.has(d.id) ? .8 : .6) : 0)
    .attr('font-size', d => explored.has(d.id) ? (topSet.has(d.id) ? 12 : 9) : 9);

  nodeG.style('cursor', d => {
    if (explored.has(d.id)) return 'pointer';
    if (isAdjacentToExplored(d.id)) return 'pointer';
    return 'default';
  });

  // Edges: only visible between two explored nodes
  svg.selectAll('.edge').each(function() {
    const idx = +this.dataset?.idx;
    if (isNaN(idx)) { d3.select(this).attr('opacity', 0); return; }
    const e = EDGES[idx];
    const vis = e && explored.has(e.s) && explored.has(e.t);
    d3.select(this).attr('opacity', vis ? null : 0);
  });
}

function showConcept(id) {
  const c = cMap[id];
  if (!c) return;

  // Reveal through fog
  exploreNeighborhood(id);

  // Compute bounding box of node + all neighbors, position card + zoom to avoid overlap
  const nb = neighbors[id];
  const pts = [c, ...Array.from(nb).map(nid => cMap[nid]).filter(Boolean)];
  const minX = Math.min(...pts.map(p=>p.x)), maxX = Math.max(...pts.map(p=>p.x));
  const minY = Math.min(...pts.map(p=>p.y)), maxY = Math.max(...pts.map(p=>p.y));
  const nodeCx = (minX + maxX) / 2;
  // Put card on the opposite side from where the node cluster is
  const nodeIsRight = nodeCx > W/2;
  const cardSide = nodeIsRight ? 'left' : 'right';
  const panel = document.getElementById('info-panel');
  panel.style.left = cardSide === 'left' ? '24px' : '';
  panel.style.right = cardSide === 'right' ? '24px' : '';

  const pad = 60;
  const bw = (maxX - minX) + pad*2, bh = (maxY - minY) + pad*2;
  // Fit into the NON-card 55% of screen
  const targetW = W * 0.45, targetH = H - 120;
  const scale = Math.min(targetW / bw, targetH / bh, 2.5);
  const cx2 = (minX + maxX) / 2, cy2 = (minY + maxY) / 2;
  // Center the cluster in the non-card half
  const panelW = 780;
  const freeCenter = nodeIsRight ? (W - panelW/2) * 0.55 + panelW : W * 0.55;
  const tx = freeCenter - cx2 * scale;
  const ty = H * 0.52 - cy2 * scale;
  svg.transition().duration(800).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );

  // Fog-aware highlight: focused + neighbors bright, other explored dim, rest fogged
  nodeG.select('circle')
    .attr('fill', n => explored.has(n.id) ? CLUSTER_COLORS[n.cluster] : '#4D355D')
    .attr('fill-opacity', n => {
      if (n.id===id || nb.has(n.id)) return 1;
      if (explored.has(n.id)) return 0.25;
      if (isAdjacentToExplored(n.id)) return 0.06;
      return 0.02;
    })
    .attr('stroke-opacity', n => (n.id===id||nb.has(n.id)) ? 0.6 : 0.02);
  nodeG.select('text')
    .attr('opacity', n => (n.id===id||nb.has(n.id)) ? 1 : 0)
    .attr('font-size', n => n.id===id ? 16 : nb.has(n.id) ? 14 : 9);
  svg.selectAll('.edge').each(function(){
    const idx=+this.dataset?.idx;
    if(isNaN(idx)){d3.select(this).attr('opacity',0);return;}
    const e=EDGES[idx];
    const connected = e&&(e.s===id||e.t===id);
    const bothExplored = e && explored.has(e.s) && explored.has(e.t);
    d3.select(this).attr('opacity', connected && bothExplored ? 1 : 0);
  });

  // Build full card (panel already referenced above for positioning)
  const detail = CONCEPT_DETAIL[id];
  const inner = document.getElementById('ip-inner');

  if (detail) {
    inner.innerHTML = `
      <div class="ip-left">
        <div class="ip-name">${c.name}</div>
        <div class="ip-def">${c.definition}</div>
        <div class="ip-intro">${detail.intro}</div>
      </div>
      <div class="ip-right">
        <div class="ip-papers-hdr">Foundational Papers</div>
        ${detail.papers.map((p, i) => {
          const lead = p.team?.[0] || {initials:'??',color:'#74508B'};
          return `<div class="ip-paper">
            <div class="ip-paper-row">
              <div class="ip-avatar" style="background:${lead.color}">${lead.initials}</div>
              <div class="ip-paper-info">
                <a href="${p.url||'#'}" target="_blank" class="ip-paper-title">${p.title}</a>
                <div class="ip-paper-meta">${lead.name}${lead.affil?' <span style="color:#74508B">· '+lead.affil+'</span>':''} · ${p.year}${p.cites?' · '+p.cites+' citations':''}</div>
              </div>
              <button class="ip-expand" onclick="event.stopPropagation();toggleIPAuthors(${i})">→</button>
            </div>
            <div class="ip-authors" id="ip-authors-${i}">
              ${(p.team||[]).map(a => {
                const parts = a.affil.split(' → ');
                const afHTML = parts.length > 1
                  ? '<span class="ip-auth-affil-line">'+parts[0]+' →</span><span class="ip-auth-affil-line">'+parts[1]+'</span>'
                  : '<span class="ip-auth-affil-line">'+a.affil+'</span>';
                return '<span class="ip-auth-chip"><span class="ip-auth-av" style="background:'+a.color+'">'+a.initials+'</span><span class="ip-auth-name">'+(a.name.split(' ')[1]||a.name)+'</span><span class="ip-auth-affil">'+afHTML+'</span><span class="ip-auth-cite">'+(a.cites||'?')+' citations</span></span>';
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } else {
    // Fallback for concepts without detail data
    inner.innerHTML = `
      <div class="ip-left" style="padding:24px 28px">
        <div class="ip-name">${c.name}</div>
        <div class="ip-def">${c.definition}</div>
        <div class="ip-intro" style="color:#74508B;margin-top:16px;font-size:13px">Full detail coming soon — this concept hasn't been fully indexed yet.</div>
      </div>`;
  }

  panel.style.display = 'block';
}

function toggleIPAuthors(idx) {
  const el = document.getElementById(`ip-authors-${idx}`);
  if (el) el.classList.toggle('open');
}

function closeInfoPanel() {
  document.getElementById('info-panel').style.display = 'none';
  resetHighlights();
  svg.transition().duration(600).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity
  );
}

// ─── SHAPE 2: EDGE ZOOM ─────────────────────────────────────────────────────

function showEdge(q) {
  const s = cMap[q.source], t = cMap[q.target];
  if (!s || !t) return;

  // Reveal both endpoints through fog
  exploreNode(q.source);
  exploreNode(q.target);

  const cx = (s.x+t.x)/2, cy = (s.y+t.y)/2;
  const scale = 1.8;
  const tx = W/2 - cx*scale, ty = H/2 - cy*scale;
  svg.transition().duration(800).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );

  setTimeout(() => {
    // Highlight both nodes + edge
    nodeG.select('circle')
      .attr('fill-opacity', n => n.id===q.source||n.id===q.target?1:.06)
      .attr('stroke-opacity', n => n.id===q.source||n.id===q.target?.8:.03);
    nodeG.select('text')
      .attr('opacity', n => n.id===q.source||n.id===q.target?1:.04)
      .attr('font-size', n => n.id===q.source||n.id===q.target ? 16 : 9);
    svg.selectAll('.edge').attr('opacity', function(){
      const idx=+this.dataset?.idx; if(isNaN(idx))return .04;
      const e=EDGES[idx];
      return e&&((e.s===q.source&&e.t===q.target)||(e.s===q.target&&e.t===q.source))?1:.04;
    });

    // Show claim panel
    const panel = document.getElementById('claim-panel');
    panel.querySelector('.cp-type').textContent = q.relType;
    panel.querySelector('.cp-type').style.color = EDGE_COLORS['causes-problem'];
    panel.querySelector('.cp-text').textContent = q.claim;
    panel.querySelector('.cp-bar').innerHTML =
      '<div style="width:30%;background:#E1543E;min-width:4px"></div>' +
      '<div style="width:70%;background:#6DAB5A;min-width:4px"></div>';
    panel.querySelector('.cp-meta').textContent = `${q.papers} papers discuss this relationship`;
    panel.style.display = 'block';
    panel.style.left = (W/2 - 200) + 'px';
    panel.style.top = (H/2 + 40) + 'px';
  }, 850);
}

function closeClaimPanel() {
  document.getElementById('claim-panel').style.display = 'none';
  resetHighlights();
  svg.transition().duration(600).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity
  );
}

// ─── SHAPE 3: PATH ──────────────────────────────────────────────────────────

let pathState = null;

function showPath(q) {
  pathState = { nodes: q.nodes, steps: q.steps, current: 0 };

  // Reveal only the first node through fog
  exploreNode(q.nodes[0]);

  // Add badge only for the first (explored) node
  addPathBadge(q.nodes[0], 0);

  // Draw path edges gold (all of them — shows the trail ahead faintly)
  for (let i = 0; i < q.nodes.length-1; i++) {
    const a = cMap[q.nodes[i]], b = cMap[q.nodes[i+1]];
    if (!a || !b) continue;
    svg.append('line').attr('class','path-marker')
      .attr('x1',a.x).attr('y1',a.y).attr('x2',b.x).attr('y2',b.y)
      .attr('stroke','#C49428').attr('stroke-width',3)
      .attr('stroke-opacity', explored.has(q.nodes[i]) && explored.has(q.nodes[i+1]) ? .5 : .1);
  }

  // Fog-aware dimming: explored path nodes bright, rest follows fog rules
  applyPathFog();

  // Show path card
  const card = document.getElementById('path-card');
  card.style.display = 'block';
  document.getElementById('pc-dots').innerHTML =
    q.nodes.map((_,i) => `<div class="pc-dot${i===0?' active':''}"></div>`).join('');
  updatePathStep();
  zoomToPathNode(0);
}

function addPathBadge(id, idx) {
  const c = cMap[id];
  if (!c) return;
  svg.append('circle').attr('class','path-badge-bg path-marker')
    .attr('cx',c.x).attr('cy',c.y-((deg[id]||0)*1.2+6)-10).attr('r',9);
  svg.append('text').attr('class','path-badge path-marker')
    .attr('x',c.x).attr('y',c.y-((deg[id]||0)*1.2+6)-6)
    .attr('text-anchor','middle').text(idx+1);
}

function applyPathFog() {
  if (!pathState) return;
  const pathSet = new Set(pathState.nodes);
  nodeG.select('circle')
    .attr('fill', n => explored.has(n.id) ? CLUSTER_COLORS[n.cluster] : pathSet.has(n.id) ? '#4D355D' : '#4D355D')
    .attr('fill-opacity', n => {
      if (explored.has(n.id) && pathSet.has(n.id)) return 1;
      if (explored.has(n.id)) return 0.15;
      if (pathSet.has(n.id)) return 0.08; // upcoming path node barely visible
      return 0.02;
    })
    .attr('stroke-opacity', n => explored.has(n.id) && pathSet.has(n.id) ? 0.6 : 0.02);
  nodeG.select('text')
    .attr('opacity', n => explored.has(n.id) && pathSet.has(n.id) ? 1 : 0)
    .attr('font-size', n => explored.has(n.id) && pathSet.has(n.id) ? 14 : 9);
}

function updatePathStep() {
  if (!pathState) return;
  const i = pathState.current;
  const c = cMap[pathState.nodes[i]];
  document.querySelector('.pc-step').textContent = `Step ${i+1} of ${pathState.nodes.length}`;
  document.querySelector('.pc-name').textContent = c.name;
  document.querySelector('.pc-desc').textContent = pathState.steps[i];
  document.getElementById('pc-prev').disabled = i === 0;
  document.getElementById('pc-next').textContent = i === pathState.nodes.length-1 ? 'Done' : 'Next →';
  document.querySelectorAll('.pc-dot').forEach((d,j) => d.classList.toggle('active', j===i));
}

function zoomToPathNode(i) {
  const c = cMap[pathState.nodes[i]];
  if (!c) return;
  const scale = 2;
  const tx = W/2 - c.x*scale, ty = H/2 - c.y*scale;
  svg.transition().duration(600).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

function pathNext() {
  if (!pathState) return;
  if (pathState.current >= pathState.nodes.length-1) {
    closePath(); return;
  }
  pathState.current++;
  // Reveal next node through fog
  const nextId = pathState.nodes[pathState.current];
  exploreNode(nextId);
  addPathBadge(nextId, pathState.current);
  applyPathFog();
  updatePathStep();
  zoomToPathNode(pathState.current);
}

function pathPrev() {
  if (!pathState || pathState.current <= 0) return;
  pathState.current--;
  updatePathStep();
  zoomToPathNode(pathState.current);
}

function closePath() {
  pathState = null;
  document.getElementById('path-card').style.display = 'none';
  svg.selectAll('.path-marker').remove();
  resetHighlights();
  svg.transition().duration(600).call(
    d3.zoom().transform.bind(null, svg),
    d3.zoomIdentity
  );
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function resetHighlights() {
  applyFog(); // return to fog state, not fully visible
}

// Enable zoom on the SVG
svg.call(d3.zoom().scaleExtent([0.5, 4]).on('zoom', e => {
  svg.selectAll('g,line,rect,text,polygon,circle').filter(function() {
    return this.parentNode === svg.node();
  }).attr('transform', e.transform);
}));
</script>
</body>
</html>
