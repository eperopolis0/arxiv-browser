name: Score daily arXiv papers

on:
  schedule:
    # NOTE: GitHub schedule crons run LATE under load. In practice the "00:30"
    # slot fires ~04:30–05:30 UTC and the safety nets ~2–3h after nominal, so
    # treat these three as retries, not precise times: whichever run first sees
    # a COMPLETE cs.AI listing writes scores/${date}.json. A run that catches
    # arXiv mid-publish exits via the scorer's readiness floor (<20 listing IDs)
    # without writing, and a thin file from an earlier run is regenerated by a
    # later slot (self-heal: existing < 50% of current listing count). That
    # replaced the bare existsSync no-op in scorer/score-today.mjs main() after
    # 2026-06-25, when a ~04:38 mid-publish run wrote a 2-paper file that the old
    # existsSync guard then locked in for the whole day.
    - cron: '30 0 * * 1-5'   # nominal night slot (~8:30pm ET); usually fires ~04:30 UTC
    - cron: '0 8 * * 1-5'    # safety net (~4am ET)
    - cron: '0 13 * * 1-5'   # late safety net (~9am ET) — last retry for slow-publish days
  workflow_dispatch: # allow manual trigger

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Score today's papers
        id: score
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: node scorer/score-today.mjs

      - name: Commit scores
        run: |
          git config user.name  "arxiv-scorer[bot]"
          git config user.email "arxiv-scorer@users.noreply.github.com"
          DATE=$(node -e "console.log(new Date().toISOString().slice(0,10))")
          git add scores/${DATE}.json
          git diff --cached --quiet || git commit -m "scores: ${DATE}"
          git push

      # Fail AFTER the commit above, so the (partial) file is still saved and
      # self-heal/re-dispatch can recover it — the red run just emails us.
      - name: Alert on suspiciously low paper count
        if: steps.score.outputs.low_count == 'true'
        run: |
          echo "::error::Scorer wrote a suspiciously low paper count for today (see the 'Score today's papers' log for the count + floor). The file was committed; re-dispatch this workflow to self-heal if it was a fetch issue."
          exit 1
