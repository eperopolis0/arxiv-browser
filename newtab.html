<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>arXiv cs.AI — Paper Map</title>
<style>
  @font-face {
    font-family: 'Argent CF';
    src: local('Argent CF'), local('ArgentCF-Regular');
    font-weight: normal;
  }
  @font-face {
    font-family: 'Argent CF';
    src: local('Argent CF Bold'), local('ArgentCF-Bold');
    font-weight: bold;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #13101c;
    color: #e8d9bc;
    font-family: 'Avenir Next', 'Avenir', 'Nunito', -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(196,148,40,0.18);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
  }
  #header-left { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  #arxiv-link {
    font-size: 2.1rem; font-family: 'Argent CF', Georgia, serif;
    font-weight: bold; letter-spacing: 0.04em;
    color: #c49428; text-decoration: none;
    line-height: 1.1;
    text-shadow: 0 0 22px rgba(196,148,40,0.35);
  }
  #arxiv-link:hover { text-decoration: underline; opacity: 0.85; }
  #header .date-label { font-size: 0.8rem; color: rgba(232,217,188,0.42); letter-spacing: 0.04em; }
  #refresh-btn {
    padding: 6px 12px; margin-left: auto; border-radius: 8px;
    border: 1px solid rgba(196,148,40,0.35);
    background: transparent;
    color: #e8d9bc;
    font-size: 0.85rem; cursor: pointer; font-family: inherit;
    transition: opacity 0.15s, background 0.15s;
    opacity: 0.6;
  }
  #refresh-btn:hover { opacity: 1; background: rgba(196,148,40,0.08); }
  #refresh-btn:disabled { cursor: default; opacity: 0.35; }
  .refresh-icon { display: inline-block; }
  #refresh-btn.spinning .refresh-icon { animation: spin 0.75s linear infinite; }

  #cluster-bar {
    padding: 5px 14px 6px;
    border-bottom: 1px solid rgba(196,148,40,0.10);
    display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0;
    background: rgba(0,0,0,0.22);
  }
  .cluster-btn {
    padding: 4px 11px; border-radius: 11px;
    border: 1.5px solid currentColor;
    background: transparent;
    font-size: 0.82rem; cursor: pointer; opacity: 0.85;
    font-family: inherit;
    transition: opacity 0.12s, background 0.12s, box-shadow 0.12s;
  }
  .cluster-btn .cb-count { font-size: 0.70rem; opacity: 0.6; margin-left: 3px; display: inline-block; min-width: 2.5ch; text-align: right; font-variant-numeric: tabular-nums; }
  .cluster-btn:hover  { opacity: 1; }
  #cluster-bar.spotlight-active .cluster-btn:not(.lit) { opacity: 0.30; }
  .cluster-btn.zero-count { opacity: 0.28; cursor: pointer; }
  .cluster-btn.zero-count:hover { opacity: 0.6; }

  /* Shared active/lit states across all button types */
  .cluster-btn.active, .filter-btn.active, .sb-tag.active, .sb-cluster-chip.active {
    opacity: 1; background: rgba(0,0,0,0.55); box-shadow: 0 0 5px 1px currentColor;
  }
  .cluster-btn.lit, .filter-btn.lit, .sb-tag.lit, .sb-cluster-chip.lit {
    opacity: 1; background: rgba(0,0,0,0.55); box-shadow: 0 0 9px 2px currentColor;
  }

  #main { display: flex; flex: 1; overflow: hidden; }

  #chart-area { flex: 1; position: relative; overflow: hidden; }
  svg#chart { width: 100%; height: 100%; cursor: default; display: block; }
  #cluster-name-display {
    position: absolute; bottom: 54px; left: 0; right: 0;
    text-align: center; pointer-events: none; z-index: 200;
    font-family: 'Argent CF', Georgia, serif;
    font-size: 2.6rem; font-weight: 700; letter-spacing: 0.06em;
    color: #c49428;
    text-shadow: 0 2px 28px rgba(196,148,40,0.5), 0 0 8px rgba(0,0,0,0.95);
    opacity: 0; transition: opacity 0.15s;
    text-transform: uppercase;
  }

  #legend {
    width: 120px; min-width: 120px;
    padding: 14px 10px;
    border-left: 1px solid rgba(196,148,40,0.12);
    display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
    background: rgba(0,0,0,0.18);
  }
  .leg-section-title {
    font-size: 0.58rem; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between;
    letter-spacing: 0.12em; color: rgba(196,148,40,0.55); margin-bottom: 6px;
  }
  .color-mode-toggle {
    font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em;
    background: transparent; border: 1px solid rgba(196,148,40,0.35); border-radius: 3px;
    color: rgba(196,148,40,0.45); cursor: pointer; padding: 1px 5px; line-height: 1.4;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .color-mode-toggle:hover { color: rgba(196,148,40,0.85); border-color: rgba(196,148,40,0.65); }
  .color-mode-toggle.active { color: rgba(196,148,40,0.95); border-color: rgba(196,148,40,0.7); background: rgba(196,148,40,0.12); }
  .leg-btns { display: flex; flex-wrap: wrap; gap: 5px; }
  .leg-btns.single-col { flex-direction: column; flex-wrap: nowrap; }
  .leg-btns.single-col .filter-btn { width: 100%; justify-content: center; }
  .filter-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px; border-radius: 10px;
    border: 1.5px solid currentColor;
    background: transparent;
    font-size: 0.62rem; cursor: pointer;
    opacity: 0.85; transition: opacity 0.12s, background 0.12s, box-shadow 0.12s;
    font-family: inherit; white-space: nowrap; overflow: hidden;
  }
  .filter-btn:hover  { opacity: 1; }
  .filter-btn.zero-count { opacity: 0.28; cursor: pointer; }
  .filter-btn.zero-count:hover { opacity: 0.6; }
  .filter-btn.active.zero-count { opacity: 0.45; }
  .filter-btn .fb-count {
    opacity: 0.55; font-size: 0.58rem;
    display: inline-block; min-width: 2ch; text-align: right; font-variant-numeric: tabular-nums;
  }
  .filter-btn.star-btn { color: #c49428; border-color: #c49428; }
  .leg-note { font-size: 0.63rem; color: rgba(232,217,188,0.25); line-height: 1.65; letter-spacing: 0.02em; }

  /* ── Starred Papers Drawer ── */
  #starred-drawer {
    position: fixed; top: 0; right: -400px; width: 380px; height: 100%;
    background: #0c0a14; border-left: 1px solid rgba(196,148,40,0.22);
    z-index: 900; transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #starred-drawer.open { right: 0; }
  #starred-drawer-header {
    padding: 14px 16px 12px; flex-shrink: 0;
    border-bottom: 1px solid rgba(196,148,40,0.15);
    display: flex; align-items: center; justify-content: space-between;
  }
  #starred-drawer-title {
    color: #c49428; font-size: 0.78rem; letter-spacing: 0.1em;
    text-transform: uppercase; text-shadow: 0 0 12px rgba(196,148,40,0.3);
  }
  #starred-drawer-close {
    background: none; border: none; color: rgba(232,217,188,0.4);
    font-size: 1.3rem; cursor: pointer; padding: 0 2px; line-height: 1;
  }
  #starred-drawer-close:hover { color: rgba(232,217,188,0.85); }
  #starred-list { overflow-y: auto; flex: 1; padding: 4px 0; }
  #starred-list::-webkit-scrollbar { width: 4px; }
  #starred-list::-webkit-scrollbar-track { background: transparent; }
  #starred-list::-webkit-scrollbar-thumb { background: rgba(196,148,40,0.2); border-radius: 2px; }
  .se-entry { padding: 10px 16px 12px; border-bottom: 1px solid rgba(196,148,40,0.07); }
  .se-entry:hover { background: rgba(196,148,40,0.04); }
  .se-title { font-size: 0.8rem; color: rgba(232,217,188,0.88); line-height: 1.4; margin-bottom: 4px; text-decoration: none; display: block; }
  .se-title:hover { color: #c49428; }
  .se-meta { font-size: 0.65rem; color: rgba(196,148,40,0.55); margin-bottom: 6px; }
  .se-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .se-btn { font-size: 0.62rem; padding: 2px 7px; border-radius: 3px; cursor: pointer; background: none; border: 1px solid rgba(196,148,40,0.3); color: rgba(196,148,40,0.7); text-decoration: none; font-family: inherit; transition: border-color 0.15s, background 0.15s, opacity 0.15s; }
  .se-btn:hover { border-color: rgba(196,148,40,0.7); color: #c49428; }
  .se-unstar { border-color: rgba(232,217,188,0.15); color: rgba(232,217,188,0.3); }
  .se-unstar:hover { border-color: rgba(225,84,62,0.5); color: rgba(225,84,62,0.8); }
  .se-empty { padding: 32px 20px; text-align: center; color: rgba(232,217,188,0.22); font-size: 0.78rem; line-height: 1.7; }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #13101c;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000;
  }
  #loading-overlay.visible { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(196,148,40,0.15);
    border-top: 2px solid #c49428;
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  #loading-msg {
    color: #c49428;
    font-size: 0.95rem;
    font-family: 'Argent CF', Georgia, serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; display: none;
    background: #0b0810;
    border: 1px solid rgba(196,148,40,0.28);
    border-radius: 9px;
    padding: 13px 15px;
    max-width: 310px; min-width: 220px;
    pointer-events: none;
    cursor: default;
    z-index: 200;
    box-shadow: 0 12px 50px rgba(0,0,0,0.8), 0 0 20px rgba(196,148,40,0.06);
  }
  .tt-clusters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; margin-top: 0; }
  .tt-cluster-chip {
    font-size: 0.63rem; padding: 2px 8px; border-radius: 10px;
    background: rgba(196,148,40,0.06);
    color: rgba(232,217,188,0.6);
    border: 1px solid rgba(196,148,40,0.2);
  }
  .tt-cluster-chip.active-chip { color: #e8d9bc; border-color: rgba(196,148,40,0.5); background: rgba(0,0,0,0.55); box-shadow: 0 0 4px 1px rgba(196,148,40,0.4); }
  .tt-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 5px; margin-top: 2px; line-height: 1.35; color: #e8d9bc; }
  .tt-gist { font-size: 0.74rem; color: rgba(232,217,188,0.6); line-height: 1.5; margin-bottom: 9px; }
  .tt-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
  .tt-badge { font-size: 0.63rem; padding: 2px 7px; border-radius: 7px; border: 1px solid currentColor; }
  .tt-authors { font-size: 0.68rem; color: rgba(232,217,188,0.35); }
  .tt-pdf-btn {
    display: block; width: 100%; margin-top: 10px;
    padding: 7px 0; border-radius: 8px; border: 1px solid rgba(109,171,90,0.4);
    background: rgba(109,171,90,0.07); color: #6DAB5A;
    font-size: 0.82rem; font-weight: 600;
    text-align: center; text-decoration: none;
    transition: background 0.15s;
    box-sizing: border-box;
  }
  .tt-pdf-btn:hover { background: rgba(109,171,90,0.16); }
  .tt-star-btn {
    display: block; width: 100%; margin-top: 6px;
    padding: 7px 0; border-radius: 8px; border: 1px solid rgba(196,148,40,0.45);
    background: rgba(196,148,40,0.07); color: #c49428;
    font-size: 0.82rem; cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .tt-star-btn:hover { background: rgba(196,148,40,0.16); }
  .tt-star-btn.starred { background: rgba(196,148,40,0.20); border-color: #c49428; }
  .tt-hint { font-size: 0.63rem; color: rgba(232,217,188,0.2); margin-top: 8px; border-top: 1px solid rgba(196,148,40,0.1); padding-top: 7px; letter-spacing: 0.02em; }
  .tt-header-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.68rem; letter-spacing: 0.04em;
    margin-bottom: 7px;
  }
  .tt-header-row [data-tip-action] { transition: opacity 0.12s; }
  .tt-header-row [data-tip-action]:hover { opacity: 1 !important; }
  .tt-header-sep { color: rgba(232,217,188,0.2); margin: 0 5px; }

  /* ── SVG text ── */
  .axis-label    { font-size: 9px; fill: rgba(196,148,40,0.50); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'Avenir Next', 'Avenir', sans-serif; cursor: default; transition: fill 0.15s; }
  .cluster-label { fill: rgba(232,217,188,0.55); font-weight: 500; pointer-events: none; transition: opacity 0.15s; }

  /* ── Search ── */
  #search-wrap {
    position: relative; display: flex; align-items: center;
    flex: 1; margin-left: 10px;
  }
  #search-input {
    background: rgba(196,148,40,0.04); border: 1px solid rgba(196,148,40,0.2);
    border-radius: 20px; color: #e8d9bc;
    padding: 12px 38px 12px 18px; font-size: 22px;
    font-family: 'Avenir Next', 'Avenir', sans-serif;
    width: 100%; box-sizing: border-box; outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  #search-input::placeholder { color: rgba(232,217,188,0.28); }
  #search-input:focus { border-color: rgba(196,148,40,0.5); background: rgba(196,148,40,0.07); }
  #search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(232,217,188,0.38);
    font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
    display: none;
  }
  #search-clear.visible { display: block; }
  #search-clear:hover { color: rgba(232,217,188,0.85); }

  /* ── Sidebar ── */
  #sidebar {
    width: 405px; min-width: 405px;
    display: flex; flex-direction: column;
    border-left: 1px solid rgba(232,217,188,0.08);
    overflow: hidden;
    transition: width 0.2s ease, min-width 0.2s ease;
  }
  #sidebar.collapsed { width: 0; min-width: 0; }
  #sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px 6px; flex-shrink: 0;
    border-bottom: 1px solid rgba(232,217,188,0.07);
  }
  #sidebar-title {
    font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(196,148,40,0.5);
  }
  #sidebar-toggle {
    background: none; border: none; color: rgba(232,217,188,0.25);
    cursor: pointer; font-size: 1.1rem; padding: 0 2px; line-height: 1;
  }
  #sidebar-toggle:hover { color: rgba(232,217,188,0.65); }
  #sidebar-show {
    background: none; border: none; color: rgba(232,217,188,0.25);
    cursor: pointer; font-size: 1.1rem; padding: 0 2px; line-height: 1;
    display: none;
  }
  #sidebar-show:hover { color: rgba(232,217,188,0.65); }
  #sidebar-list {
    flex: 1; overflow-y: auto; padding: 2px 0;
  }
  #sidebar-list::-webkit-scrollbar { width: 4px; }
  #sidebar-list::-webkit-scrollbar-track { background: transparent; }
  #sidebar-list::-webkit-scrollbar-thumb { background: rgba(196,148,40,0.85); border-radius: 2px; }
  .sb-card {
    padding: 10px 15px 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(232,217,188,0.04);
    transition: background 0.1s;
  }
  .sb-card:hover      { background: rgba(232,217,188,0.04); }
  .sb-card.sb-active  { background: rgba(232,217,188,0.055); }
  .sb-card-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px; flex-wrap: wrap; gap: 4px;
  }
  .sb-meta-tags { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .sb-tag {
    font-size: 0.68rem; padding: 1px 7px; border-radius: 9px;
    background: transparent; border: 1px solid currentColor;
    cursor: pointer; font-family: inherit;
    opacity: 0.42; transition: opacity 0.12s, box-shadow 0.12s;
    display: inline-block; line-height: 1.5;
  }
  .sb-tag:hover  { opacity: 1; }
  .sb-unverified {
    font-size: 0.75rem; opacity: 0.45; font-style: italic;
  }
  .sb-title {
    font-size: 1.14rem; line-height: 1.35; color: rgba(232,217,188,0.88);
    font-family: 'Argent CF', Georgia, serif;
    font-weight: bold;
    margin-bottom: 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .sb-gist {
    font-size: 0.98rem; line-height: 1.35; color: rgba(232,217,188,0.22);
    font-family: 'Argent CF', Georgia, serif;
    font-weight: 300;
    margin-bottom: 8px;
    transition: color 0.15s;
  }
  /* Gap and excerpt always visible — they are the signal */
  .sb-gap     { color: rgba(232,217,188,0.82); }
  .sb-excerpt { color: rgba(196,148,40,0.85); }
  /* Surrounding gist text: dim by default, half-bright on hover, full-bright when active */
  .sb-card.sb-active .sb-gist { color: rgba(232,217,188,0.82); }
  .sb-clusters {
    display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px;
  }
  .sb-cluster-chip {
    font-size: 0.63rem; padding: 2px 9px; border-radius: 11px;
    background: transparent;
    border: 1.5px solid currentColor;
    cursor: pointer; font-family: inherit; transition: opacity 0.12s, box-shadow 0.12s;
    opacity: 0.42;
  }
  .sb-cluster-chip:hover  { opacity: 1; color: rgba(232,217,188,0.9); }
  .sb-actions {
    display: flex; gap: 7px; margin-top: 2px;
  }
  .sb-star {
    flex: 1; padding: 5px 0; border-radius: 7px;
    background: none; border: 1px solid rgba(196,148,40,0.28); cursor: pointer;
    font-size: 0.82rem; font-family: inherit; font-weight: 600;
    color: rgba(196,148,40,0.6);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .sb-star:hover { background: rgba(196,148,40,0.08); color: #c49428; border-color: rgba(196,148,40,0.55); }
  .sb-star.starred { background: rgba(196,148,40,0.15); color: #c49428; border-color: #c49428; }
  .sb-pdf {
    flex: 1; padding: 5px 0; border-radius: 7px;
    background: none; border: 1px solid rgba(109,171,90,0.3); cursor: pointer;
    font-size: 0.82rem; font-family: inherit; font-weight: 600;
    color: rgba(109,171,90,0.65); text-decoration: none; text-align: center;
    transition: background 0.12s, color 0.12s;
  }
  .sb-pdf:hover { background: rgba(109,171,90,0.1); color: #6DAB5A; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-msg">Loading today's papers…</div>
  <div id="loading-sub" style="color:rgba(196,148,40,0.45);font-size:0.78rem;margin-top:10px;letter-spacing:0.06em;"></div>
  <button id="loading-retry" onclick="forceRefresh()" style="margin-top:18px;background:rgba(196,148,40,0.08);border:1px solid rgba(196,148,40,0.3);color:#e8d9bc;padding:8px 20px;border-radius:12px;cursor:pointer;font-size:0.85rem;display:none;">Retry now</button>
</div>

<div id="header">
  <div id="header-left">
    <a id="arxiv-link" href="https://arxiv.org/list/cs.AI/recent" target="_blank">arXiv cs.AI</a>
    <span class="date-label"><span id="header-date">Loading</span> · <span id="vis-count">0</span> papers</span>
  </div>
  <button id="sidebar-show" title="Show paper list">‹</button>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search titles, abstracts…" autocomplete="off" spellcheck="false">
    <button id="search-clear" aria-label="Clear search">✕</button>
  </div>
  <button id="refresh-btn"><span class="refresh-icon">↻</span> Refresh</button>
</div>

<div id="cluster-bar"></div>
<div id="main">
  <div id="legend"></div>
  <div id="chart-area"><svg id="chart"></svg><div id="cluster-name-display"></div></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">Relevant today</span>
      <button id="sidebar-toggle" title="Hide paper list">›</button>
    </div>
    <div id="sidebar-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="starred-drawer">
  <div id="starred-drawer-header">
    <span id="starred-drawer-title">★ Starred Papers (<span id="starred-drawer-count">0</span>)</span>
    <button id="starred-drawer-close">×</button>
  </div>
  <div id="starred-list"></div>
</div>

<script src="d3.min.js"></script>
<script src="newtab.js"></script>
</body>
</html>
